<style>
:root{--navy:#0E5C63;--navy2:#0a474d;--amber:#E08D2B;--bg:#f4f7f8;--card:#fff;--line:#dfe7e8;--text:#1f2933;--mut:#6b7785;--ok:#1f9d57;--bad:#c0392b;--blue:#1c5fb0}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:"Microsoft JhengHei","PingFang TC",system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:15px}
header{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;padding:13px 16px;position:sticky;top:0;z-index:20;display:flex;justify-content:space-between;align-items:center}
header .t{font-size:16px;font-weight:700}header .t small{font-weight:400;opacity:.85;font-size:12px}
header button{background:rgba(255,255,255,.16);color:#fff;border:0;border-radius:8px;padding:7px 11px;font-size:13px;font-family:inherit;margin-left:6px}
main{padding:14px;max-width:760px;margin:0 auto;padding-bottom:50px}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:14px}
.card h3{margin:0 0 12px;font-size:15px;color:var(--navy)}
label{display:block;font-size:13px;color:var(--mut);margin:10px 0 4px;font-weight:600}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);border-radius:9px;font-size:15px;font-family:inherit;background:#fff}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--navy)}
.row{display:flex;gap:10px}.row>*{flex:1}
button.act{background:var(--navy);color:#fff;border:0;border-radius:10px;padding:14px;font-size:16px;font-weight:700;width:100%;font-family:inherit;margin-top:14px}
button.act:active{background:var(--navy2)}button.act.done{background:var(--ok)}
button.sec{background:#eef3f2;color:var(--navy);border:1px solid var(--line);border-radius:9px;padding:9px 12px;font-weight:600;font-family:inherit;font-size:13px}
button.mini{background:#fff;border:1px solid var(--line);border-radius:7px;padding:5px 9px;font-size:12px;font-family:inherit;color:var(--navy);font-weight:600}
button.danger{background:#fbe9e7;color:var(--bad);border:1px solid #f3c9c3}
.big{font-size:20px;font-weight:800;color:var(--navy)}
.matline{display:flex;gap:8px;align-items:flex-end;margin-bottom:8px}.matline>div{flex:1}.matline .qy{flex:0 0 70px}.matline .rm{flex:0 0 36px}
.rm button{background:#fbe9e7;color:var(--bad);border:0;border-radius:8px;width:36px;height:44px;font-size:18px}
.wo{border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:8px;background:#fff}
.wo .id{font-weight:700;color:var(--navy)}.wo .meta{font-size:12px;color:var(--mut);margin-top:3px}
.pill{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:700;display:inline-block}
.s-待派工{background:#eceff1;color:#546e7a}.s-已派工{background:#fff8e1;color:#a17400}.s-進行中{background:#e3f0ff;color:var(--blue)}.s-已完成{background:#e6f6ec;color:var(--ok)}.s-待料{background:#fff3e0;color:#b45309}
.src-保養{background:#e3f0ff;color:var(--blue)}.src-維修{background:#fdecea;color:var(--bad)}.src-優化{background:#f3e8ff;color:#7b3fb5}.src-故障叫修{background:#fdecea;color:var(--bad)}
.tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px}
.tabs button{flex:0 0 auto;border:1px solid var(--line);background:#fff;border-radius:9px;padding:9px 12px;font-weight:700;color:var(--mut);font-family:inherit;font-size:13px;white-space:nowrap}
.tabs button.on{background:var(--navy);color:#fff;border-color:var(--navy)}
table{width:100%;border-collapse:collapse;font-size:13px}th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}th{color:var(--mut)}td.n,th.n{text-align:right}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#222;color:#fff;padding:12px 20px;border-radius:24px;font-size:15px;z-index:60;opacity:0;transition:.25s;pointer-events:none;max-width:90%;text-align:center}
.toast.show{opacity:1}.toast.ok{background:var(--ok)}.toast.bad{background:var(--bad)}
.hide{display:none}.hint{font-size:12px;color:var(--mut);line-height:1.6;margin-top:6px}.center{text-align:center}.mut{color:var(--mut)}
.qrgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.qrcell{border:1px solid var(--line);border-radius:8px;padding:8px;text-align:center}
.qrcell .lbl{font-size:11px;font-weight:700;color:var(--navy);margin-top:4px;word-break:break-all}.qrcell .nm{font-size:10px;color:var(--mut)}
.landing{max-width:440px;margin:7vh auto;text-align:center}.landing .logo{font-size:52px}.landing h1{color:var(--navy);margin:6px 0}
.landing button{width:100%;padding:17px;font-size:18px;font-weight:800;border-radius:12px;border:0;margin-top:12px;font-family:inherit}
.b-eng{background:var(--navy);color:#fff}.b-adm{background:#fff;color:var(--navy);border:2px solid var(--navy)!important}
.namegrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}.namegrid button{padding:18px;font-size:17px;font-weight:700;border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--navy);font-family:inherit}
.kpi{display:flex;gap:10px;flex-wrap:wrap}.kpi .b{flex:1;min-width:90px;background:#f0f6f5;border-radius:10px;padding:12px;text-align:center}.kpi .b .v{font-size:22px;font-weight:800;color:var(--navy)}.kpi .b .l{font-size:12px;color:var(--mut)}
@media print{header,.tabs,.noprint{display:none!important}.qrcell{break-inside:avoid}}
</style>

const DEFAULT_AREAS=[{code:"1E",name:"製一課 成型區",dept:"製一課"},{code:"1G",name:"製一課 粉碎區",dept:"製一課"},{code:"2S",name:"製二課 調味區",dept:"製二課"},{code:"3B",name:"製三課 內包裝區",dept:"製三課"},{code:"3P",name:"製三課 外包裝區",dept:"製三課"}];
firebase.initializeApp(CFG);const db=firebase.database(),ROOT=db.ref("maintenance");
let EQUIP={},MAT={},CONF={laborRate:DEFAULT_RATE,pin:DEFAULT_PIN},WOS={},REPS={},AREAS={};
let adminAuthed=false,ENGINEER=sessionStorage.getItem("bfy_eng")||"";
const $=s=>document.querySelector(s),el=(t,p={})=>Object.assign(document.createElement(t),p),APP=()=>document.getElementById("app");
function toast(m,k){const t=$("#toast");t.textContent=m;t.className="toast show "+(k||"");setTimeout(()=>t.className="toast",2200);}
function nf(n){return (Number(n)||0).toLocaleString();}
function catOf(id){const m=(id||"").match(/^[A-Za-z]+/);return m?m[0]:"";}
function catName(c){return CAT_MAP[c]||c;}
function areaOf(id){return (id||"").slice(-2);}
function baseUrl(){return location.href.split("#")[0];}
function esc(s){return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function todayStr(){return new Date().toISOString().slice(0,10);}
function dStr(ts){return new Date(ts||0).toISOString().slice(0,10);}

async function loadMasters(){
  const [e,m,c,a]=await Promise.all([ROOT.child("equipment").get(),ROOT.child("material").get(),ROOT.child("config").get(),ROOT.child("areas").get()]);
  EQUIP=e.val()||{};MAT=m.val()||{};CONF=Object.assign({laborRate:DEFAULT_RATE,pin:DEFAULT_PIN},c.val()||{});
  AREAS=a.val()||{};if(!Object.keys(AREAS).length){DEFAULT_AREAS.forEach(x=>AREAS[x.code]=x);}
}
function listenLive(){ROOT.child("workorders").on("value",s=>{WOS=s.val()||{};rerender();});ROOT.child("reports").on("value",s=>{REPS=s.val()||{};rerender();});}
const eqArr=()=>Object.values(EQUIP).sort((a,b)=>a.id<b.id?-1:1);
const matArr=()=>Object.values(MAT).sort((a,b)=>a.id<b.id?-1:1);
const woArr=()=>Object.entries(WOS).map(([k,v])=>Object.assign({_k:k},v));
const repArr=()=>Object.entries(REPS).map(([k,v])=>Object.assign({_k:k},v));
const areaArr=()=>Object.values(AREAS).sort((a,b)=>a.code<b.code?-1:1);

let curArg=null;
function rerender(){route(true);}
function route(){const h=location.hash||"";
  if(h.indexOf("#scan=")===0)return engScan(h.slice(6));
  if(h.indexOf("#report=")===0)return faultView(h.slice(8));
  if(h==="#eng")return engHome();
  if(h.indexOf("#pivot")===0)return engPivot();
  if(h==="#myperf")return engPerf();
  if(h==="#admin")return adminAuthed?adminView():adminLogin();
  landing();}
window.addEventListener("hashchange",()=>route());

function landing(){APP().innerHTML=`<div class="landing"><div class="logo">🐠</div><h1>BFY 工務報工系統</h1>
  <div class="mut">派工 · 報工 · 成本歸集</div>
  <button class="b-eng" onclick="location.hash='#eng'">🔧 我要報工（工程師）</button>

  <div class="hint" style="margin-top:16px">工程師也可直接掃描設備 QR 報工、或掃描叫修 QR 報修。</div></div>`;}

/* ===== 工程師端 ===== */
function engHeader(sub){return `<header><div class="t">🐠 工務報工 <small>${esc(sub||"")}</small></div><div>${ENGINEER?`<button onclick="switchEng()">${esc(ENGINEER)} ▾</button>`:""}<button onclick="location.hash=''">首頁</button></div></header>`;}

  if(!ENGINEER){APP().innerHTML=engHeader("請選擇身分")+`<main><div class="card"><h3>請選擇你的名字</h3>
    <div class="namegrid">${REPORTERS.map(n=>`<button onclick="pickEng('${n}')">${n}</button>`).join("")}</div></div></main>`;return;}
  APP().innerHTML=engHeader(ENGINEER)+`<main>
    <div class="card center"><div class="hint">目前身分</div><div class="big">${esc(ENGINEER)}</div></div>

window.pickEng=function(n){ENGINEER=n;sessionStorage.setItem("bfy_eng",n);engHome();};
function engPickEquip(){const eqs=eqArr();APP().innerHTML=engHeader(ENGINEER)+`<main><div class="card"><h3>選擇設備</h3>
  <label>設備</label><select id="e_pick">${eqs.map(e=>`<option value="${e.id}">${e.id}　${esc(e.name)}</option>`).join("")}</select>
  <button class="act" onclick="location.hash='#scan='+document.getElementById('e_pick').value">進入報工</button>
  <button class="sec" style="width:100%;margin-top:10px" onclick="location.hash='#eng'">返回</button></div></main>`;}

let pivotFilter="mine";
function engPivot(){
  const filt=`<label>檢視</label><select id="pv_f" onchange="pivotFilter=this.value;engPivot()">
    <option value="mine" ${pivotFilter==="mine"?"selected":""}>只看我的（${esc(ENGINEER)}）</option>
    <option value="all" ${pivotFilter==="all"?"selected":""}>全部</option>
    ${REPORTERS.map(n=>`<option value="${n}" ${pivotFilter===n?"selected":""}>${n}</option>`).join("")}
    <option value="unassigned" ${pivotFilter==="unassigned"?"selected":""}>未指派</option></select>`;
  let ws=woArr().filter(w=>w.status!=="已完成");
  if(pivotFilter==="mine")ws=ws.filter(w=>w.assignedTo===ENGINEER);
  else if(pivotFilter==="unassigned")ws=ws.filter(w=>!w.assignedTo);
  else if(pivotFilter!=="all")ws=ws.filter(w=>w.assignedTo===pivotFilter);
  ws.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  APP().innerHTML=engHeader(ENGINEER)+`<main><div class="card"><h3>派工總覽</h3>${filt}
    <div style="margin-top:12px" id="pv_list">${ws.length?ws.map(woCardEng).join(""):'<div class="hint">沒有符合的工單。</div>'}</div></div>
    <button class="sec" style="width:100%" onclick="location.hash='#eng'">返回</button></main>`;
}
function woCardEng(w){return `<div class="wo"><div style="display:flex;justify-content:space-between;align-items:flex-start">
  <div><div class="id">${esc(w.id||w._k)} <span class="pill src-${w.source||"保養"}">${esc(w.source||"")}</span></div>
  <div class="meta">${esc(w.equipName||w.equip)} · ${esc(w.item||w.symptom||"")} · 指派:${esc(w.assignedTo||"未指派")}</div></div>
  <span class="pill s-${w.status||"待派工"}">${w.status||"待派工"}</span></div>
  <button class="sec" style="width:100%;margin-top:10px" onclick="location.hash='#scan='+'${esc(w.equip)}';setTimeout(()=>receiveWO('${w._k}','${esc(w.equip)}'),300)">接收/回報</button></div>`;}

let mLines=[{}],activeWO=null;
function engScan(eqid){
  const eq=EQUIP[eqid];
  if(!ENGINEER){sessionStorage.setItem("bfy_after",location.hash);ENGINEER="";APP().innerHTML=engHeader("請選擇身分")+`<main><div class="card"><h3>請先選擇你的名字</h3><div class="namegrid">${REPORTERS.map(n=>`<button onclick="pickEng2('${n}','${esc(eqid)}')">${n}</button>`).join("")}</div></div></main>`;return;}
  if(!eq){APP().innerHTML=engHeader()+`<main><div class="card"><h3>找不到設備</h3><div class="hint">編號 ${esc(eqid)} 不在主檔。</div><button class="sec" style="margin-top:12px" onclick="location.hash='#eng'">返回</button></div></main>`;return;}
  const open=woArr().filter(w=>w.equip===eqid&&w.status!=="已完成").sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  mLines=[{}];activeWO=null;
  APP().innerHTML=engHeader(ENGINEER)+`<main>
    <div class="card"><div class="big">${esc(eq.name)}</div><div class="hint">${esc(eq.id)}　${esc(eq.line||"")}</div></div>
    <div class="card"><h3>本設備未完成工單</h3><div>${open.length?open.map(w=>woCardRecv(w,eqid)).join(""):'<div class="hint">無，可用下方直接新增回報。</div>'}</div></div>
    <div class="card"><h3>＋ 新增工作並回報</h3><label>類別</label><select id="r_src"><option>保養</option><option>維修</option><option>優化</option></select><div id="rform"></div></div></main>`;
  renderReportForm(eqid,null);
}
window.pickEng2=function(n,eqid){ENGINEER=n;sessionStorage.setItem("bfy_eng",n);engScan(eqid);};
function woCardRecv(w,eqid){return `<div class="wo"><div class="id">${esc(w.id||w._k)} <span class="pill src-${w.source||"保養"}">${esc(w.source||"")}</span></div>
  <div class="meta">${esc(w.item||w.symptom||"")} · 指派:${esc(w.assignedTo||"—")} <span class="pill s-${w.status||"待派工"}">${w.status||"待派工"}</span></div>
  <button class="sec" style="margin-top:10px;width:100%" onclick="receiveWO('${w._k}','${eqid}')">接收此工單回報</button></div>`;}
window.receiveWO=function(k,eqid){activeWO=k;const w=WOS[k];if(w&&w.source&&$("#r_src"))$("#r_src").value=w.source;toast("已帶入工單");renderReportForm(eqid,k);const f=$("#rform");if(f)f.scrollIntoView({behavior:"smooth"});};
function renderReportForm(eqid,woKey){const box=$("#rform");if(!box)return;
  box.innerHTML=`${woKey?`<div class="hint">回報工單：<b>${esc((WOS[woKey]||{}).id||woKey)}</b></div>`:""}
    <label>回報人</label><select id="r_by">${REPORTERS.map(n=>`<option ${n===ENGINEER?"selected":""}>${n}</option>`).join("")}</select>
    <label>項目/說明</label><input id="r_item" placeholder="保養項目或故障現象" value="${woKey?esc((WOS[woKey]||{}).item||(WOS[woKey]||{}).symptom||""):""}">
    <div class="row"><div><label>進度</label><select id="r_prog"><option>進行中</option><option>已完成</option><option>待料</option></select></div>
    <div><label>工時(小時)</label><input id="r_hr" type="number" inputmode="decimal" step="0.5" value="1"></div></div>
    <label style="margin-top:12px">使用耗材</label><div id="r_mat"></div>
    <button class="sec" id="r_addmat" style="margin-top:4px">＋ 新增耗材</button>
    <label style="margin-top:12px">備註</label><textarea id="r_note" rows="2"></textarea>
    <button class="act" id="r_submit">送出報工</button>`;
  drawMat();$("#r_addmat").onclick=()=>{mLines.push({});drawMat();};$("#r_submit").onclick=()=>submitReport(eqid,woKey);}
function drawMat(){const mats=matArr();const cats=[...new Set(mats.map(m=>catOf(m.id)))].sort();const box=$("#r_mat");if(!box)return;box.innerHTML="";
  mLines.forEach((ln,i)=>{const items=mats.filter(m=>catOf(m.id)===(ln.cat||cats[0]));const d=el("div",{className:"matline"});
    d.innerHTML=`<div><select data-i="${i}" class="mc">${cats.map(c=>`<option value="${c}" ${c===ln.cat?"selected":""}>${c} ${esc(catName(c))}</option>`).join("")}</select></div>
      <div><select data-i="${i}" class="mi">${items.map(m=>`<option value="${m.id}" ${m.id===ln.id?"selected":""}>${esc(m.name)}</option>`).join("")}</select></div>
      <div class="qy"><input data-i="${i}" class="mq" type="number" inputmode="numeric" min="0" placeholder="數量" value="${ln.qty||""}"></div>
      <div class="rm"><button data-i="${i}" class="mx">×</button></div>`;box.appendChild(d);});
  box.querySelectorAll(".mc").forEach(s=>s.onchange=e=>{mLines[+e.target.dataset.i]={cat:e.target.value};drawMat();});
  box.querySelectorAll(".mi").forEach(s=>s.onchange=e=>{mLines[+e.target.dataset.i].id=e.target.value;});
  box.querySelectorAll(".mq").forEach(s=>s.oninput=e=>{mLines[+e.target.dataset.i].qty=+e.target.value;});
  box.querySelectorAll(".mx").forEach(b=>b.onclick=e=>{mLines.splice(+e.target.dataset.i,1);if(!mLines.length)mLines=[{}];drawMat();});}
async function submitReport(eqid,woKey){
  const by=$("#r_by").value,prog=$("#r_prog").value,hr=+$("#r_hr").value||0,item=$("#r_item").value,note=$("#r_note").value,src=$("#r_src")?$("#r_src").value:"保養";
  const mats=matArr();const materials=mLines.filter(l=>l.id&&l.qty).map(l=>{const m=mats.find(x=>x.id===l.id);return{id:l.id,name:m?m.name:l.id,qty:l.qty};});
  $("#r_submit").disabled=true;$("#r_submit").textContent="送出中…";
  try{const now=Date.now();let woId=woKey;
    if(!woKey){const ref=ROOT.child("workorders").push();await ref.set({id:"WO-"+dStr(now).replace(/-/g,"")+"-"+String(now).slice(-4),source:src,equip:eqid,equipName:(EQUIP[eqid]||{}).name||"",item:item,assignedTo:by,priority:"中",status:prog,createdAt:now,from:"engineer"});woId=ref.key;}
    else{await ROOT.child("workorders/"+woKey).update({status:prog,item:item||WOS[woKey].item,assignedTo:WOS[woKey].assignedTo||by,finishAt:prog==="已完成"?now:null});}
    await ROOT.child("reports").push().set({woKey:woId,equip:eqid,equipName:(EQUIP[eqid]||{}).name||"",reporter:by,progress:prog,hours:hr,materials:materials,note:note,source:src,createdAt:now});
    $("#r_submit").className="act done";$("#r_submit").textContent="✓ 已送出";toast("報工已送出，謝謝 "+by,"ok");
    setTimeout(()=>location.hash="#pivot",900);
  }catch(e){toast("送出失敗："+e.message,"bad");$("#r_submit").disabled=false;$("#r_submit").textContent="送出報工";}}

function engPerf(){
  const today=todayStr();const mine=repArr().filter(r=>r.reporter===ENGINEER);
  const td=mine.filter(r=>dStr(r.createdAt)===today);
  const wkAgo=Date.now()-6*864e5;const wk=mine.filter(r=>(r.createdAt||0)>=wkAgo);
  const sum=arr=>({n:arr.length,done:arr.filter(r=>r.progress==="已完成").length,hr:arr.reduce((s,r)=>s+(r.hours||0),0)});
  const t=sum(td),w=sum(wk);
  APP().innerHTML=engHeader(ENGINEER)+`<main>
    <div class="card"><h3>今日（${today}）</h3><div class="kpi"><div class="b"><div class="v">${t.n}</div><div class="l">報工筆數</div></div><div class="b"><div class="v">${t.done}</div><div class="l">已完成</div></div><div class="b"><div class="v">${t.hr}</div><div class="l">工時</div></div></div></div>
    <div class="card"><h3>近 7 日</h3><div class="kpi"><div class="b"><div class="v">${w.n}</div><div class="l">報工筆數</div></div><div class="b"><div class="v">${w.done}</div><div class="l">已完成</div></div><div class="b"><div class="v">${w.hr}</div><div class="l">工時</div></div></div></div>
    <button class="sec" style="width:100%" onclick="location.hash='#eng'">返回</button></main>`;
}

function faultView(code){
  const area=AREAS[code];const eqs=eqArr().filter(e=>areaOf(e.id)===code);
  APP().innerHTML=`<header><div class="t">🚨 設備報修 <small>${area?esc(area.name):esc(code)}</small></div><button onclick="location.hash=''">首頁</button></header><main>
    <div class="card">${area?`<div class="big">${esc(area.name)}</div>`:`<div class="big">區域 ${esc(code)}</div>`}<div class="hint">填寫故障報修，送出後進入待派工。</div></div>
    <div class="card">
      <label>報修人</label><input id="fr_by" placeholder="你的名字">
      <label>設備</label><select id="fr_eq">${eqs.length?eqs.map(e=>`<option value="${e.id}">${e.id}　${esc(e.name)}</option>`).join(""):'<option value="">（此區無設備，請洽工務）</option>'}</select>
      <label>故障現象</label><textarea id="fr_sym" rows="3" placeholder="描述異常狀況"></textarea>
      <label>急迫度</label><select id="fr_urg"><option>中</option><option>高（停線）</option><option>低</option></select>
      <button class="act" id="fr_submit">送出報修</button>
    </div></main>`;
  $("#fr_submit").onclick=()=>submitFault(code);
}
async function submitFault(code){
  const by=$("#fr_by").value.trim(),eq=$("#fr_eq").value,sym=$("#fr_sym").value.trim(),urg=$("#fr_urg").value;
  if(!eq){toast("此區無設備可選","bad");return;}if(!sym){toast("請描述故障現象","bad");return;}
  $("#fr_submit").disabled=true;$("#fr_submit").textContent="送出中…";
  try{const now=Date.now();const area=AREAS[code]||{};
    await ROOT.child("workorders").push().set({id:"FR-"+dStr(now).replace(/-/g,"")+"-"+String(now).slice(-4),source:"故障叫修",equip:eq,equipName:(EQUIP[eq]||{}).name||"",item:sym,symptom:sym,urgency:urg,reporter:by,area:code,dept:area.dept||"",priority:urg.indexOf("高")>=0?"高":"中",status:"待派工",createdAt:now,from:"fault"});
    APP().innerHTML=`<header><div class="t">🚨 設備報修</div></header><main><div class="card center"><div class="big" style="color:var(--ok)">✓ 報修已送出</div><div class="hint">工務已收到，將盡快派工處理。</div><button class="act" onclick="location.hash='#report='+'${esc(code)}'">再報一筆</button></div></main>`;
  }catch(e){toast("送出失敗："+e.message,"bad");$("#fr_submit").disabled=false;$("#fr_submit").textContent="送出報修";}}

  const open=woArr().filter(w=>w.status!=="已完成").sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  $("#wlist").innerHTML=open.length?open.map(w=>`<div class="wo"><div style="display:flex;justify-content:space-between"><div><div class="id">${esc(w.id||w._k)} <span class="pill src-${w.source||"保養"}">${esc(w.source||"")}</span></div><div class="meta">${esc(w.equipName||w.equip)} · ${esc(w.item||w.symptom||"")} · 指派:${esc(w.assignedTo||"—")}${w.urgency?(" · 急迫:"+esc(w.urgency)):""}</div></div><span class="pill s-${w.status||"待派工"}">${w.status||"待派工"}</span></div>
    <div style="margin-top:8px;display:flex;gap:6px"><select class="mini" style="flex:1" onchange="setWOStatus('${w._k}',this.value)"><option ${w.status==="待派工"?"selected":""}>待派工</option><option ${w.status==="已派工"?"selected":""}>已派工</option><option ${w.status==="進行中"?"selected":""}>進行中</option><option ${w.status==="待料"?"selected":""}>待料</option><option ${w.status==="已完成"?"selected":""}>已完成</option></select>
    <select class="mini" onchange="setWOAssign('${w._k}',this.value)"><option value="">指派…</option>${REPORTERS.map(n=>`<option ${w.assignedTo===n?"selected":""}>${n}</option>`).join("")}</select>
    <button class="mini danger" onclick="delWO('${w._k}')">刪</button></div></div>`).join(""):'<div class="hint">無未完成工單。</div>';
}
window.addWO=async function(){const eq=$("#w_eq").value,now=Date.now();const rec={id:"WO-"+dStr(now).replace(/-/g,"")+"-"+String(now).slice(-4),source:$("#w_src").value,equip:eq,equipName:(EQUIP[eq]||{}).name||"",item:$("#w_item").value,priority:$("#w_pri").value,assignedTo:$("#w_to").value,status:$("#w_to").value?"已派工":"待派工",createdAt:now};if($("#w_due").value)rec.due=$("#w_due").value;await ROOT.child("workorders").push().set(rec);toast("工單已建立","ok");admDispatch();};
window.setWOStatus=async function(k,v){await ROOT.child("workorders/"+k).update({status:v,finishAt:v==="已完成"?Date.now():null});toast("狀態已更新","ok");};
window.setWOAssign=async function(k,v){await ROOT.child("workorders/"+k).update({assignedTo:v,status:(WOS[k].status==="待派工"&&v)?"已派工":WOS[k].status});toast("已指派 "+(v||"—"),"ok");};
window.delWO=async function(k){if(!confirm("刪除此工單？"))return;await ROOT.child("workorders/"+k).remove();toast("已刪除","ok");admDispatch();};

function admReports(){const reps=repArr().sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  $("#adminBody").innerHTML=`<div class="card"><h3>報工總表（${reps.length} 筆）— 可改/刪</h3>
    <div class="hint">測試資料可在此刪除。</div>
    <div style="max-height:64vh;overflow:auto;margin-top:8px"><table><tr><th>時間</th><th>設備</th><th>人/進度</th><th>工時</th><th>耗材</th><th class="n">成本</th><th></th></tr>
    ${reps.map(r=>{const c=costOf(r);const md=(r.materials||[]).map(m=>m.name+"x"+m.qty).join("、");
      return `<tr><td>${dStr(r.createdAt)}<br><span class="mut">${new Date(r.createdAt||0).toTimeString().slice(0,5)}</span></td>
      <td>${esc(r.equipName||r.equip)}<br><span class="pill src-${r.source||"保養"}">${esc(r.source||"")}</span></td>
      <td>${esc(r.reporter)}<br><span class="pill s-${r.progress}">${esc(r.progress)}</span></td>
      <td class="n">${r.hours}</td><td style="font-size:11px">${esc(md)}</td><td class="n">${nf(c.total)}</td>
      <td><button class="mini" onclick="editRep('${r._k}')">改</button><br><button class="mini danger" style="margin-top:4px" onclick="delRep('${r._k}')">刪</button></td></tr>`;}).join("")||'<tr><td colspan=7 class="hint">尚無報工</td></tr>'}
    </table></div></div>`;
}
window.delRep=async function(k){if(!confirm("刪除此報工紀錄？"))return;await ROOT.child("reports/"+k).remove();toast("已刪除","ok");admReports();};
window.editRep=function(k){const r=REPS[k];const nh=prompt("工時(小時)",r.hours);if(nh===null)return;const np=prompt("進度(進行中/已完成/待料)",r.progress);if(np===null)return;const nn=prompt("備註",r.note||"");ROOT.child("reports/"+k).update({hours:+nh||0,progress:np,note:nn}).then(()=>{toast("已更新","ok");admReports();});};

function admMaster(){const seeded=Object.keys(EQUIP).length>0;const mats=matArr();
  $("#adminBody").innerHTML=`<div class="card"><h3>主檔初始化</h3><div class="hint">設備：${Object.keys(EQUIP).length}　耗材：${Object.keys(MAT).length}　費率：${CONF.laborRate} 元/時</div>
    <button class="${seeded?"sec":"act"}" style="margin-top:10px" onclick="seedAll()">${seeded?"重新寫入主檔(覆蓋)":"一鍵初始化(78設備+118耗材)"}</button></div>
    <div class="card"><h3>工時費率</h3><div class="row"><input id="rate" type="number" value="${CONF.laborRate}"><button class="sec" onclick="saveRate()">儲存</button></div></div>
    <div class="card"><h3>耗材單價(${mats.length})</h3><div class="row noprint"><input id="bulk" type="number" placeholder="一鍵全部設為此價"><button class="sec" onclick="bulkPrice()">套用全部</button></div>
    <div style="max-height:50vh;overflow:auto;margin-top:8px"><table><tr><th>編號</th><th>品項</th><th class="n">單價</th></tr>
    ${mats.map(m=>`<tr><td>${m.id}</td><td>${esc(m.name)}</td><td class="n"><input style="width:78px;padding:5px;text-align:right" type="number" value="${m.price!=null?m.price:1}" onchange="setPrice('${m.id}',this.value)"></td></tr>`).join("")}</table></div></div>`;}
window.seedAll=async function(){if(!confirm("寫入主檔？(覆蓋設備/耗材/區域主檔)"))return;const eo={};SEED_EQ.forEach(e=>eo[e.id]={id:e.id,name:e.name,line:e.line,status:e.status});const mo={};SEED_MAT.forEach(m=>mo[m.id]={id:m.id,name:m.name,cat:m.cat,unit:m.unit,price:1});const ao={};DEFAULT_AREAS.forEach(a=>ao[a.code]=a);await ROOT.child("equipment").set(eo);await ROOT.child("material").set(mo);await ROOT.child("areas").update(ao);await ROOT.child("config").update({laborRate:CONF.laborRate||DEFAULT_RATE,pin:CONF.pin||DEFAULT_PIN});await loadMasters();toast("主檔已初始化","ok");admMaster();};
window.saveRate=async function(){const v=+$("#rate").value||DEFAULT_RATE;await ROOT.child("config/laborRate").set(v);CONF.laborRate=v;toast("已儲存","ok");};
window.bulkPrice=async function(){const v=+$("#bulk").value;if(isNaN(v))return toast("請輸入數字","bad");const o={};matArr().forEach(m=>o[m.id+"/price"]=v);await ROOT.child("material").update(o);await loadMasters();toast("全部單價設為 "+v,"ok");admMaster();};
window.setPrice=async function(id,v){await ROOT.child("material/"+id+"/price").set(+v||0);if(MAT[id])MAT[id].price=+v||0;toast("已更新 "+id,"ok");};

function costOf(r){const labor=(r.hours||0)*(CONF.laborRate||DEFAULT_RATE);let mat=0;(r.materials||[]).forEach(m=>{const p=(MAT[m.id]||{}).price;mat+=(m.qty||0)*(p!=null?p:0);});return{labor,mat,total:labor+mat};}
function admCost(){const reps=repArr();let tot=0,byMon={},byType={保養:0,維修:0,優化:0,故障叫修:0};
  reps.forEach(r=>{const c=costOf(r);tot+=c.total;const mon=dStr(r.createdAt).slice(0,7);byMon[mon]=(byMon[mon]||0)+c.total;if(byType[r.source]!=null)byType[r.source]+=c.total;});
  $("#adminBody").innerHTML=`<div class="card center"><div class="hint">累計報工成本(${reps.length}筆)</div><div class="big" style="font-size:28px">${nf(tot)} 元</div><button class="sec noprint" style="margin-top:10px" onclick="exportCSV()">匯出 CSV</button></div>
    <div class="card"><h3>類別成本</h3><table><tr><th>類別</th><th class="n">成本</th></tr>${Object.entries(byType).map(([k,v])=>`<tr><td>${k}</td><td class="n">${nf(v)}</td></tr>`).join("")}</table></div>
    <div class="card"><h3>各月成本</h3><table><tr><th>月份</th><th class="n">成本</th></tr>${Object.entries(byMon).sort().map(([k,v])=>`<tr><td>${k}</td><td class="n">${nf(v)}</td></tr>`).join("")||'<tr><td colspan=2 class="hint">尚無</td></tr>'}</table></div>`;}
window.exportCSV=function(){const cols=["時間","設備","設備名稱","來源","回報人","進度","工時","耗材明細","工時成本","耗材成本","總成本"];const rows=[cols.join(",")];
  repArr().sort((a,b)=>(a.createdAt||0)-(b.createdAt||0)).forEach(r=>{const c=costOf(r);const md=(r.materials||[]).map(m=>m.name+"x"+m.qty).join(" / ");rows.push([new Date(r.createdAt||0).toLocaleString(),r.equip,r.equipName,r.source||"",r.reporter,r.progress,r.hours,md,c.labor,c.mat,c.total].map(x=>`"${(x==null?"":String(x)).replace(/"/g,'""')}"`).join(","));});
  const blob=new Blob(["\ufeff"+rows.join("\n")],{type:"text/csv"});const a=el("a",{href:URL.createObjectURL(blob),download:"工務報工_"+todayStr()+".csv"});a.click();};

function admPerf(){
  const d=$("#perfDate")?$("#perfDate").value:todayStr();
  const reps=repArr();
  // 工程師別(指定日)
  const byEngDay={};REPORTERS.forEach(n=>byEngDay[n]={n:0,done:0,hr:0,cost:0});
  reps.filter(r=>dStr(r.createdAt)===d).forEach(r=>{const c=costOf(r);const e=byEngDay[r.reporter];if(e){e.n++;if(r.progress==="已完成")e.done++;e.hr+=r.hours||0;e.cost+=c.total;}});
  // 工程師別(累計)
  const byEng={};REPORTERS.forEach(n=>byEng[n]={n:0,hr:0,cost:0});reps.forEach(r=>{const c=costOf(r);const e=byEng[r.reporter];if(e){e.n++;e.hr+=r.hours||0;e.cost+=c.total;}});
  // 設備別
  const byEq={};reps.forEach(r=>{const k=r.equip||"—";byEq[k]=byEq[k]||{name:r.equipName||k,n:0,fix:0,maint:0,hr:0,cost:0};const c=costOf(r);byEq[k].n++;if(r.source==="維修"||r.source==="故障叫修")byEq[k].fix++;if(r.source==="保養")byEq[k].maint++;byEq[k].hr+=r.hours||0;byEq[k].cost+=c.total;});
  const eqTop=Object.entries(byEq).sort((a,b)=>b[1].cost-a[1].cost).slice(0,20);
  const fixTop=Object.entries(byEq).sort((a,b)=>b[1].fix-a[1].fix).slice(0,10).filter(x=>x[1].fix>0);
  // 最燒耗材
  const byMat={};reps.forEach(r=>(r.materials||[]).forEach(m=>{const p=(MAT[m.id]||{}).price||0;byMat[m.id]=byMat[m.id]||{name:m.name,qty:0,cost:0};byMat[m.id].qty+=m.qty||0;byMat[m.id].cost+=(m.qty||0)*p;}));
  const matTop=Object.entries(byMat).sort((a,b)=>b[1].cost-a[1].cost).slice(0,10);
  $("#adminBody").innerHTML=`
  <div class="card"><h3>工程師當日效益</h3><label>日期</label><input id="perfDate" type="date" value="${d}" onchange="admPerf()">
    <table style="margin-top:10px"><tr><th>工程師</th><th class="n">筆數</th><th class="n">完成</th><th class="n">工時</th><th class="n">成本</th></tr>
    ${REPORTERS.map(n=>{const e=byEngDay[n];return `<tr><td>${n}</td><td class="n">${e.n}</td><td class="n">${e.done}</td><td class="n">${e.hr}</td><td class="n">${nf(e.cost)}</td></tr>`;}).join("")}</table></div>
  <div class="card"><h3>工程師累計效益</h3><table><tr><th>工程師</th><th class="n">總筆數</th><th class="n">總工時</th><th class="n">總成本</th></tr>
    ${REPORTERS.map(n=>{const e=byEng[n];return `<tr><td>${n}</td><td class="n">${e.n}</td><td class="n">${e.hr}</td><td class="n">${nf(e.cost)}</td></tr>`;}).join("")}</table></div>
  <div class="card"><h3>設備別成本(前20)</h3><table><tr><th>設備</th><th class="n">次數</th><th class="n">維修</th><th class="n">保養</th><th class="n">工時</th><th class="n">成本</th></tr>
    ${eqTop.map(([k,v])=>`<tr><td>${esc(v.name)}</td><td class="n">${v.n}</td><td class="n">${v.fix}</td><td class="n">${v.maint}</td><td class="n">${v.hr}</td><td class="n">${nf(v.cost)}</td></tr>`).join("")||'<tr><td colspan=6 class="hint">尚無</td></tr>'}</table></div>
  <div class="card"><h3>最常維修設備 Top10</h3><table><tr><th>設備</th><th class="n">維修次數</th></tr>${fixTop.map(([k,v])=>`<tr><td>${esc(v.name)}</td><td class="n">${v.fix}</td></tr>`).join("")||'<tr><td colspan=2 class="hint">尚無</td></tr>'}</table></div>
  <div class="card"><h3>最燒耗材 Top10</h3><table><tr><th>耗材</th><th class="n">用量</th><th class="n">金額</th></tr>${matTop.map(([k,v])=>`<tr><td>${esc(v.name)}</td><td class="n">${v.qty}</td><td class="n">${nf(v.cost)}</td></tr>`).join("")||'<tr><td colspan=3 class="hint">尚無</td></tr>'}</table></div>`;
}
window.admPerf=admPerf;

function admArea(){const eqs=eqArr();
  $("#adminBody").innerHTML=`<div class="card"><h3>叫修區域管理</h3><div class="hint">每區一張 QR；報修時設備依「設備編號末兩碼＝區碼」自動篩選。</div>
    <table style="margin-top:8px"><tr><th>區碼</th><th>區名</th><th>課別</th><th class="n">設備數</th><th></th></tr>
    ${areaArr().map(a=>`<tr><td>${esc(a.code)}</td><td>${esc(a.name)}</td><td>${esc(a.dept||"")}</td><td class="n">${eqs.filter(e=>areaOf(e.id)===a.code).length}</td><td><button class="mini danger" onclick="delArea('${esc(a.code)}')">刪</button></td></tr>`).join("")}</table></div>
    <div class="card"><h3>新增/修改區域</h3><div class="row"><div><label>區碼(設備末兩碼)</label><input id="a_code" placeholder="如 2S"></div><div><label>課別</label><input id="a_dept" placeholder="如 製二課"></div></div>
    <label>區名</label><input id="a_name" placeholder="如 製二課 調味區">
    <button class="act" onclick="saveArea()">儲存區域</button></div>`;}
window.saveArea=async function(){const code=$("#a_code").value.trim().toUpperCase();if(!code)return toast("請填區碼","bad");await ROOT.child("areas/"+code).set({code:code,name:$("#a_name").value.trim()||code,dept:$("#a_dept").value.trim()});await loadMasters();toast("已儲存區域 "+code,"ok");admArea();};
window.delArea=async function(code){if(!confirm("刪除區域 "+code+"？"))return;await ROOT.child("areas/"+code).remove();await loadMasters();toast("已刪除","ok");admArea();};

function admQR(){const eqs=eqArr();const ars=areaArr();
  $("#adminBody").innerHTML=`<div class="card noprint"><h3>QR 產生與列印</h3><div class="hint">目前網址：${baseUrl()}<br>設備QR＝報工(#scan=)；區域QR＝叫修報修(#report=)。</div>
    <button class="sec" style="margin-top:8px" onclick="window.print()">🖨️ 列印此頁全部 QR</button></div>
    <div class="card"><h3>區域叫修 QR（${ars.length}）</h3><div class="qrgrid" id="qra"></div></div>
    <div class="card"><h3>設備報工 QR（${eqs.length}）</h3><div class="qrgrid" id="qre"></div></div>`;
  const ga=$("#qra");ars.forEach(a=>{const cell=el("div",{className:"qrcell"});const box=el("div");cell.appendChild(box);cell.appendChild(el("div",{className:"lbl",textContent:"報修 "+a.code}));cell.appendChild(el("div",{className:"nm",textContent:a.name}));ga.appendChild(cell);new QRCode(box,{text:baseUrl()+"#report="+a.code,width:110,height:110,correctLevel:QRCode.CorrectLevel.M});});
  const ge=$("#qre");eqs.forEach(e=>{const cell=el("div",{className:"qrcell"});const box=el("div");cell.appendChild(box);cell.appendChild(el("div",{className:"lbl",textContent:e.id}));cell.appendChild(el("div",{className:"nm",textContent:e.name}));ge.appendChild(cell);new QRCode(box,{text:baseUrl()+"#scan="+e.id,width:110,height:110,correctLevel:QRCode.CorrectLevel.M});});}

(async function(){try{await loadMasters();listenLive();}catch(e){console.error(e);toast("連線 Firebase 失敗","bad");}route();})();
</script></body></html>
