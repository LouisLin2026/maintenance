<title>BFY 工務報工系統 · 小福🐠</title>
<style>
:root{--navy:#0E5C63;--navy2:#0a474d;--amber:#E08D2B;--bg:#f4f7f8;--card:#fff;--line:#dfe7e8;--text:#1f2933;--mut:#6b7785;--ok:#1f9d57;--bad:#c0392b;--blue:#1c5fb0}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:"Microsoft JhengHei","PingFang TC",system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:15px}
header{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;padding:14px 16px;position:sticky;top:0;z-index:20;display:flex;justify-content:space-between;align-items:center}
header .t{font-size:17px;font-weight:700}header .t small{font-weight:400;opacity:.8;font-size:12px}
header button{background:rgba(255,255,255,.15);color:#fff;border:0;border-radius:8px;padding:7px 11px;font-size:13px;font-family:inherit}
main{padding:14px;max-width:720px;margin:0 auto;padding-bottom:50px}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:14px}
.card h3{margin:0 0 12px;font-size:15px;color:var(--navy)}
label{display:block;font-size:13px;color:var(--mut);margin:10px 0 4px;font-weight:600}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);border-radius:9px;font-size:15px;font-family:inherit;background:#fff}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--navy)}
.row{display:flex;gap:10px}.row>*{flex:1}
button.act{background:var(--navy);color:#fff;border:0;border-radius:10px;padding:14px;font-size:16px;font-weight:700;width:100%;font-family:inherit;margin-top:14px}
button.act:active{background:var(--navy2)}button.act.done{background:var(--ok)}
button.sec{background:#eef3f2;color:var(--navy);border:1px solid var(--line);border-radius:9px;padding:10px 12px;font-weight:600;font-family:inherit;font-size:14px}
.big{font-size:20px;font-weight:800;color:var(--navy)}
.matline{display:flex;gap:8px;align-items:flex-end;margin-bottom:8px}
.matline>div{flex:1}.matline .qy{flex:0 0 70px}.matline .rm{flex:0 0 36px}
.rm button{background:#fbe9e7;color:var(--bad);border:0;border-radius:8px;width:36px;height:44px;font-size:18px}
.wo{border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:8px;background:#fff}
.wo .id{font-weight:700;color:var(--navy)}.wo .meta{font-size:12px;color:var(--mut);margin-top:3px}
.pill{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:700;display:inline-block}
.s-待派工{background:#eceff1;color:#546e7a}.s-進行中{background:#e3f0ff;color:var(--blue)}.s-已完成{background:#e6f6ec;color:var(--ok)}.s-待料{background:#fff3e0;color:#b45309}
.src-保養{background:#e3f0ff;color:var(--blue)}.src-維修{background:#fdecea;color:var(--bad)}.src-優化{background:#f3e8ff;color:#7b3fb5}
.tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.tabs button{flex:1;border:1px solid var(--line);background:#fff;border-radius:9px;padding:10px 4px;font-weight:700;color:var(--mut);font-family:inherit;font-size:14px}
.tabs button.on{background:var(--navy);color:#fff;border-color:var(--navy)}
table{width:100%;border-collapse:collapse;font-size:13px}th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:left}th{color:var(--mut)}td.n,th.n{text-align:right}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#222;color:#fff;padding:12px 20px;border-radius:24px;font-size:15px;z-index:60;opacity:0;transition:.25s;pointer-events:none;max-width:90%;text-align:center}
.toast.show{opacity:1}.toast.ok{background:var(--ok)}.toast.bad{background:var(--bad)}
.hide{display:none}.hint{font-size:12px;color:var(--mut);line-height:1.6;margin-top:6px}
.center{text-align:center}.mut{color:var(--mut)}
.qrgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.qrcell{border:1px solid var(--line);border-radius:8px;padding:8px;text-align:center}
.qrcell .lbl{font-size:11px;font-weight:700;color:var(--navy);margin-top:4px;word-break:break-all}
.qrcell .nm{font-size:10px;color:var(--mut)}
.landing{max-width:420px;margin:8vh auto;text-align:center}
.landing .logo{font-size:54px}.landing h1{color:var(--navy);margin:6px 0}
.landing button{width:100%;padding:18px;font-size:18px;font-weight:800;border-radius:12px;border:0;margin-top:14px;font-family:inherit}
.b-eng{background:var(--navy);color:#fff}.b-adm{background:#fff;color:var(--navy);border:2px solid var(--navy)!important}
@media print{header,.tabs,.noprint{display:none!important}.qrgrid{grid-template-columns:repeat(3,1fr)}.qrcell{break-inside:avoid}}
</style>

const $=s=>document.querySelector(s), el=(t,p={})=>Object.assign(document.createElement(t),p);
const APP=()=>document.getElementById("app");
function toast(m,k){const t=$("#toast");t.textContent=m;t.className="toast show "+(k||"");setTimeout(()=>t.className="toast",2200);}
function nf(n){return (Number(n)||0).toLocaleString();}
function catOf(id){const m=(id||"").match(/^[A-Za-z]+/);return m?m[0]:"";}
function catName(c){return CAT_MAP[c]||c;}
function baseUrl(){return location.href.split("#")[0];}
function esc(s){return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));}

/* ---- 載入主檔 + 即時監聽 ---- */
async function loadMasters(){
  const [e,m,c]=await Promise.all([ROOT.child("equipment").get(),ROOT.child("material").get(),ROOT.child("config").get()]);
  EQUIP=e.val()||{}; MAT=m.val()||{}; CONF=Object.assign({laborRate:DEFAULT_RATE,pin:DEFAULT_PIN},c.val()||{});
}
function listenLive(){
  ROOT.child("workorders").on("value",s=>{WOS=s.val()||{};rerender();});
  ROOT.child("reports").on("value",s=>{REPS=s.val()||{};rerender();});
}
function eqArr(){return Object.values(EQUIP).sort((a,b)=>a.id<b.id?-1:1);}
function matArr(){return Object.values(MAT).sort((a,b)=>a.id<b.id?-1:1);}
function woArr(){return Object.entries(WOS).map(([k,v])=>Object.assign({_k:k},v));}
function repArr(){return Object.entries(REPS).map(([k,v])=>Object.assign({_k:k},v));}

/* ============ 路由 ============ */
let curView="";
function rerender(){route(true);}
function route(keep){
  const h=location.hash||"";
  if(h.indexOf("#scan=")===0){curView="scan";engScan(h.slice(6));return;}
  if(h==="#eng"){curView="eng";engHome();return;}
  if(h==="#admin"){curView="admin";adminAuthed?adminView():adminLogin();return;}
  landing();
}
window.addEventListener("hashchange",()=>route());

/* ============ 著陸頁 ============ */
function landing(){
  APP().innerHTML=`<div class="landing">
    <div class="logo">🐠</div><h1>BFY 工務報工系統</h1>
    <div class="mut">派工 · 報工 · 成本歸集</div>
    <button class="b-eng" onclick="location.hash='#eng'">🔧 我要報工（工程師）</button>
    <button class="b-adm" onclick="location.hash='#admin'">🗂️ 後台管理</button>
    <div class="hint" style="margin-top:18px">工程師請直接掃描設備上的 QR 進入報工。</div>
  </div>`;
}

/* ============ 工程師端 ============ */
function engHeader(sub){return `<header><div class="t">🐠 工務報工 <small>${sub||""}</small></div><button onclick="location.hash=''">首頁</button></header>`;}
function engHome(){
  const eqs=eqArr();
  APP().innerHTML=engHeader("選擇設備")+`<main>
    <div class="card"><h3>請掃描設備 QR，或選擇設備</h3>
      <label>設備</label>
      <select id="e_pick">${eqs.map(e=>`<option value="${e.id}">${e.id}　${esc(e.name)}</option>`).join("")}</select>
      <button class="act" onclick="location.hash='#scan='+document.getElementById('e_pick').value">進入</button>
    </div></main>`;
}
let mLines=[{}];
function engScan(eqid){
  const eq=EQUIP[eqid];
  if(!eq){APP().innerHTML=engHeader()+`<main><div class="card"><h3>找不到設備</h3><div class="hint">編號 ${esc(eqid)} 不在設備主檔。請洽後台或回首頁重選。</div><button class="sec" style="margin-top:12px" onclick="location.hash='#eng'">選擇設備</button></div></main>`;return;}
  const open=woArr().filter(w=>w.equip===eqid && w.status!=="已完成").sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  mLines=[{}];
  APP().innerHTML=engHeader(eq.id)+`<main>
    <div class="card"><div class="big">${esc(eq.name)}</div><div class="hint">${esc(eq.id)}　${esc(eq.line||"")}</div></div>
    <div class="card"><h3>本設備未完成工單（點選接收回報）</h3>
      <div id="wolist">${open.length?open.map(w=>woCard(w,eqid)).join(""):'<div class="hint">目前沒有指派的工單。可用下方「新增工作」直接回報。</div>'}</div>
    </div>
    <div class="card"><h3>＋ 新增工作並回報</h3>
      <label>類別</label><select id="r_src"><option>保養</option><option>維修</option><option>優化</option></select>
      <div id="rform"></div>
    </div></main>`;
  renderReportForm(eqid,null);
}
function woCard(w,eqid){
  return `<div class="wo"><div style="display:flex;justify-content:space-between;align-items:center">
    <div><div class="id">${esc(w.id||w._k)}</div><div class="meta">${esc(w.item||"")} · 指派:${esc(w.assignedTo||"—")}</div></div>
    <span class="pill s-${w.status||"待派工"}">${w.status||"待派工"}</span></div>
    <button class="sec" style="margin-top:10px;width:100%" onclick="receiveWO('${w._k}','${eqid}')">接收此工單回報</button></div>`;
}
let activeWO=null;
function receiveWO(k,eqid){activeWO=k;const w=WOS[k];if(w&&w.source)$("#r_src").value=w.source;toast("已帶入工單："+(w.id||k));renderReportForm(eqid,k);window.scrollTo(0,document.body.scrollHeight);}
function renderReportForm(eqid,woKey){
  const box=$("#rform");if(!box)return;
  box.innerHTML=`
    ${woKey?`<div class="hint">回報對象工單：<b>${esc((WOS[woKey]||{}).id||woKey)}</b>（不接收工單可直接填）</div>`:""}
    <label>回報人</label><select id="r_by">${REPORTERS.map(n=>`<option>${n}</option>`).join("")}</select>
    <label>項目 / 說明</label><input id="r_item" placeholder="保養項目或故障現象" value="${woKey?esc((WOS[woKey]||{}).item||""):""}">
    <div class="row"><div><label>進度</label><select id="r_prog"><option>進行中</option><option>已完成</option><option>待料</option></select></div>
    <div><label>工時(小時)</label><input id="r_hr" type="number" inputmode="decimal" step="0.5" value="1"></div></div>
    <label style="margin-top:12px">使用耗材</label><div id="r_mat"></div>
    <button class="sec" id="r_addmat" style="margin-top:4px">＋ 新增耗材</button>
    <label style="margin-top:12px">備註</label><textarea id="r_note" rows="2"></textarea>
    <button class="act" id="r_submit">送出報工</button>`;
  drawMat();
  $("#r_addmat").onclick=()=>{mLines.push({});drawMat();};
  $("#r_submit").onclick=()=>submitReport(eqid,woKey);
}
function drawMat(){
  const mats=matArr();const cats=[...new Set(mats.map(m=>catOf(m.id)))].sort();
  const box=$("#r_mat");if(!box)return;box.innerHTML="";
  mLines.forEach((ln,i)=>{
    const items=mats.filter(m=>catOf(m.id)===(ln.cat||cats[0]));
    const d=el("div",{className:"matline"});
    d.innerHTML=`<div><select data-i="${i}" class="mc">${cats.map(c=>`<option value="${c}" ${c===ln.cat?"selected":""}>${c} ${esc(catName(c))}</option>`).join("")}</select></div>
      <div><select data-i="${i}" class="mi">${items.map(m=>`<option value="${m.id}" ${m.id===ln.id?"selected":""}>${esc(m.name)}</option>`).join("")}</select></div>
      <div class="qy"><input data-i="${i}" class="mq" type="number" inputmode="numeric" min="0" placeholder="數量" value="${ln.qty||""}"></div>
      <div class="rm"><button data-i="${i}" class="mx">×</button></div>`;
    box.appendChild(d);
  });
  box.querySelectorAll(".mc").forEach(s=>s.onchange=e=>{mLines[+e.target.dataset.i]={cat:e.target.value};drawMat();});
  box.querySelectorAll(".mi").forEach(s=>s.onchange=e=>{mLines[+e.target.dataset.i].id=e.target.value;});
  box.querySelectorAll(".mq").forEach(s=>s.oninput=e=>{mLines[+e.target.dataset.i].qty=+e.target.value;});
  box.querySelectorAll(".mx").forEach(b=>b.onclick=e=>{mLines.splice(+e.target.dataset.i,1);if(!mLines.length)mLines=[{}];drawMat();});
}
async function submitReport(eqid,woKey){
  const by=$("#r_by").value, prog=$("#r_prog").value, hr=+$("#r_hr").value||0;
  const item=$("#r_item").value, note=$("#r_note").value, src=$("#r_src").value;
  const mats=matArr();
  const materials=mLines.filter(l=>l.id&&l.qty).map(l=>{const m=mats.find(x=>x.id===l.id);return {id:l.id,name:m?m.name:l.id,qty:l.qty};});
  $("#r_submit").disabled=true;$("#r_submit").textContent="送出中…";
  try{
    const now=Date.now();
    let woId=woKey;
    if(!woKey){ // 新增臨時工單
      const ref=ROOT.child("workorders").push();
      await ref.set({id:"WO-"+new Date(now).toISOString().slice(0,10).replace(/-/g,"")+"-"+String(now).slice(-4),
        source:src,equip:eqid,equipName:(EQUIP[eqid]||{}).name||"",item:item,assignedTo:by,priority:"中",
        status:prog,createdAt:now,from:"engineer"});
      woId=ref.key;
    }else{
      await ROOT.child("workorders/"+woKey).update({status:prog,item:item||WOS[woKey].item,finishAt:prog==="已完成"?now:null});
    }
    await ROOT.child("reports").push().set({woKey:woId,equip:eqid,equipName:(EQUIP[eqid]||{}).name||"",
      reporter:by,progress:prog,hours:hr,materials:materials,note:note,source:src,createdAt:now});
    $("#r_submit").className="act done";$("#r_submit").textContent="✓ 已送出";
    toast("報工已送出，謝謝 "+by,"ok");
    setTimeout(()=>engScan(eqid),900);
  }catch(e){toast("送出失敗："+e.message,"bad");$("#r_submit").disabled=false;$("#r_submit").textContent="送出報工";}
}

/* ============ 後台 ============ */
function adminLogin(){
  APP().innerHTML=`<div class="landing"><div class="logo">🔐</div><h1>後台登入</h1>
    <label style="text-align:left">PIN 密碼</label><input id="pin" type="password" inputmode="numeric" placeholder="輸入 PIN">
    <button class="b-eng" onclick="tryPin()">登入</button>
    <button class="sec" style="width:100%;margin-top:10px" onclick="location.hash=''">返回</button></div>`;
  $("#pin").addEventListener("keydown",e=>{if(e.key==="Enter")tryPin();});
}
window.tryPin=function(){const p=$("#pin").value;if(p===(CONF.pin||DEFAULT_PIN)){adminAuthed=true;adminView();}else toast("PIN 錯誤","bad");};
let adminTab="dispatch";
function adminView(){
  APP().innerHTML=`<header><div class="t">🐠 後台管理 <small>派工 · 主檔 · 成本</small></div><button onclick="adminAuthed=false;location.hash=''">登出</button></header>
  <main><div class="tabs">
    <button data-t="dispatch">派工</button><button data-t="master">主檔/單價</button>
    <button data-t="cost">成本</button><button data-t="qr">QR列印</button></div>
    <div id="adminBody"></div></main>`;
  document.querySelectorAll(".tabs button").forEach(b=>{b.classList.toggle("on",b.dataset.t===adminTab);b.onclick=()=>{adminTab=b.dataset.t;adminView();};});
  ({dispatch:admDispatch,master:admMaster,cost:admCost,qr:admQR}[adminTab])();
}
function admDispatch(){
  const eqs=eqArr();
  $("#adminBody").innerHTML=`
  <div class="card"><h3>新增派工單</h3>
    <div class="row"><div><label>來源</label><select id="w_src"><option>保養</option><option>維修</option><option>優化</option></select></div>
    <div><label>優先</label><select id="w_pri"><option>中</option><option>高</option><option>低</option></select></div></div>
    <label>設備</label><select id="w_eq">${eqs.map(e=>`<option value="${e.id}">${e.id}　${esc(e.name)}</option>`).join("")}</select>
    <label>項目/說明</label><input id="w_item">
    <div class="row"><div><label>指派工程師</label><select id="w_to"><option value="">未指派</option>${REPORTERS.map(n=>`<option>${n}</option>`).join("")}</select></div>
    <div><label>到期日</label><input id="w_due" type="date"></div></div>
    <button class="act" onclick="addWO()">建立工單</button>
  </div>
  <div class="card"><h3>未完成工單</h3><div id="wlist"></div></div>`;
  const open=woArr().filter(w=>w.status!=="已完成").sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  $("#wlist").innerHTML=open.length?open.map(w=>`<div class="wo"><div style="display:flex;justify-content:space-between">
    <div><div class="id">${esc(w.id||w._k)} <span class="pill src-${w.source||"保養"}">${w.source||""}</span></div>
    <div class="meta">${esc(w.equipName||w.equip)} · ${esc(w.item||"")} · 指派:${esc(w.assignedTo||"—")}</div></div>
    <span class="pill s-${w.status||"待派工"}">${w.status||"待派工"}</span></div></div>`).join(""):'<div class="hint">無未完成工單。</div>';
}
window.addWO=async function(){
  const eq=$("#w_eq").value,now=Date.now();
  const rec={id:"WO-"+new Date(now).toISOString().slice(0,10).replace(/-/g,"")+"-"+String(now).slice(-4),
    source:$("#w_src").value,equip:eq,equipName:(EQUIP[eq]||{}).name||"",item:$("#w_item").value,
    priority:$("#w_pri").value,assignedTo:$("#w_to").value,status:"待派工",createdAt:now};
  if($("#w_due").value)rec.due=$("#w_due").value;
  await ROOT.child("workorders").push().set(rec);toast("工單已建立 "+rec.id,"ok");admDispatch();
};
function admMaster(){
  const seeded=Object.keys(EQUIP).length>0;
  const mats=matArr();
  $("#adminBody").innerHTML=`
  <div class="card"><h3>主檔初始化</h3>
    <div class="hint">設備：${Object.keys(EQUIP).length} 筆　耗材：${Object.keys(MAT).length} 筆　工時費率：${CONF.laborRate} 元/時</div>
    ${!seeded?'<button class="act" onclick="seedAll()">一鍵初始化（寫入 78 設備＋118 耗材，單價先 1 元）</button>':'<button class="sec" style="margin-top:10px" onclick="seedAll()">重新寫入主檔（會覆蓋）</button>'}
  </div>
  <div class="card"><h3>工時費率</h3><div class="row"><input id="rate" type="number" value="${CONF.laborRate}"><button class="sec" onclick="saveRate()">儲存</button></div></div>
  <div class="card"><h3>耗材單價（${mats.length} 筆）</h3>
    <div class="row noprint"><input id="bulk" type="number" placeholder="一鍵全部設為此價"><button class="sec" onclick="bulkPrice()">套用全部</button></div>
    <div class="hint">或於下表逐筆改，改完按 Enter 自動存。</div>
    <div style="max-height:50vh;overflow:auto;margin-top:8px"><table><tr><th>編號</th><th>品項</th><th class="n">單價</th></tr>
    ${mats.map(m=>`<tr><td>${m.id}</td><td>${esc(m.name)}</td><td class="n"><input style="width:80px;padding:5px;text-align:right" type="number" value="${m.price!=null?m.price:1}" onchange="setPrice('${m.id}',this.value)"></td></tr>`).join("")}
    </table></div>
  </div>`;
}
window.seedAll=async function(){
  if(!confirm("確定寫入主檔？(會覆蓋現有設備/耗材主檔)"))return;
  const eo={};SEED_EQ.forEach(e=>eo[e.id]={id:e.id,name:e.name,line:e.line,status:e.status});
  const mo={};SEED_MAT.forEach(m=>mo[m.id]={id:m.id,name:m.name,cat:m.cat,unit:m.unit,price:1});
  await ROOT.child("equipment").set(eo);await ROOT.child("material").set(mo);
  await ROOT.child("config").update({laborRate:CONF.laborRate||DEFAULT_RATE,pin:CONF.pin||DEFAULT_PIN});
  await loadMasters();toast("主檔已初始化","ok");admMaster();
};
window.saveRate=async function(){const v=+$("#rate").value||DEFAULT_RATE;await ROOT.child("config/laborRate").set(v);CONF.laborRate=v;toast("已儲存 "+v,"ok");};
window.bulkPrice=async function(){const v=+$("#bulk").value;if(isNaN(v))return toast("請輸入數字","bad");const o={};matArr().forEach(m=>o[m.id+"/price"]=v);await ROOT.child("material").update(o);await loadMasters();toast("全部單價設為 "+v,"ok");admMaster();};
window.setPrice=async function(id,v){await ROOT.child("material/"+id+"/price").set(+v||0);if(MAT[id])MAT[id].price=+v||0;toast("已更新 "+id,"ok");};
function costOf(r){const labor=(r.hours||0)*(CONF.laborRate||DEFAULT_RATE);let mat=0;(r.materials||[]).forEach(m=>{const p=(MAT[m.id]||{}).price;mat+=(m.qty||0)*(p!=null?p:0);});return {labor,mat,total:labor+mat};}
function admCost(){
  const reps=repArr();let tot=0,byEq={},byMon={},byType={保養:0,維修:0,優化:0};
  reps.forEach(r=>{const c=costOf(r);tot+=c.total;const e=r.equipName||r.equip||"—";byEq[e]=(byEq[e]||0)+c.total;
    const mon=new Date(r.createdAt||0).toISOString().slice(0,7);byMon[mon]=(byMon[mon]||0)+c.total;
    if(r.source&&byType[r.source]!=null)byType[r.source]+=c.total;});
  const eqRows=Object.entries(byEq).sort((a,b)=>b[1]-a[1]).slice(0,40);
  $("#adminBody").innerHTML=`
  <div class="card center"><div class="hint">累計報工成本（${reps.length} 筆）</div><div class="big" style="font-size:28px">${nf(tot)} 元</div>
    <button class="sec noprint" style="margin-top:10px" onclick="exportCSV()">匯出 CSV</button></div>
  <div class="card"><h3>保養 vs 維修 vs 優化</h3><table><tr><th>類別</th><th class="n">成本</th></tr>
    ${Object.entries(byType).map(([k,v])=>`<tr><td>${k}</td><td class="n">${nf(v)}</td></tr>`).join("")}</table></div>
  <div class="card"><h3>各月成本</h3><table><tr><th>月份</th><th class="n">成本</th></tr>
    ${Object.entries(byMon).sort().map(([k,v])=>`<tr><td>${k}</td><td class="n">${nf(v)}</td></tr>`).join("")||'<tr><td colspan=2 class="hint">尚無資料</td></tr>'}</table></div>
  <div class="card"><h3>設備別成本</h3><table><tr><th>設備</th><th class="n">成本</th></tr>
    ${eqRows.map(([k,v])=>`<tr><td>${esc(k)}</td><td class="n">${nf(v)}</td></tr>`).join("")||'<tr><td colspan=2 class="hint">尚無資料</td></tr>'}</table></div>`;
}
window.exportCSV=function(){
  const cols=["時間","設備","設備名稱","來源","回報人","進度","工時","耗材明細","工時成本","耗材成本","總成本"];
  const rows=[cols.join(",")];
  repArr().sort((a,b)=>(a.createdAt||0)-(b.createdAt||0)).forEach(r=>{const c=costOf(r);
    const md=(r.materials||[]).map(m=>m.name+"x"+m.qty).join(" / ");
    rows.push([new Date(r.createdAt||0).toLocaleString(),r.equip,r.equipName,r.source||"",r.reporter,r.progress,r.hours,md,c.labor,c.mat,c.total].map(x=>`"${(x==null?"":String(x)).replace(/"/g,'""')}"`).join(","));});
  const blob=new Blob(["\ufeff"+rows.join("\n")],{type:"text/csv"});
  const a=el("a",{href:URL.createObjectURL(blob),download:"工務報工_"+new Date().toISOString().slice(0,10)+".csv"});a.click();
};
function admQR(){
  const eqs=eqArr();
  $("#adminBody").innerHTML=`<div class="card noprint"><h3>QR 產生與列印</h3>
    <div class="hint">QR 內容＝目前網址 ＋ #scan=設備編號（自動帶入，部署後即正確）。<br>目前網址：${baseUrl()}</div>
    <button class="sec" style="margin-top:10px" onclick="window.print()">🖨️ 列印全部 QR（${eqs.length} 台）</button></div>
    <div class="card"><div class="qrgrid" id="qrgrid"></div></div>`;
  const g=$("#qrgrid");
  eqs.forEach(e=>{const cell=el("div",{className:"qrcell"});const box=el("div");cell.appendChild(box);
    const lbl=el("div",{className:"lbl",textContent:e.id});const nm=el("div",{className:"nm",textContent:e.name});
    cell.appendChild(lbl);cell.appendChild(nm);g.appendChild(cell);
    new QRCode(box,{text:baseUrl()+"#scan="+e.id,width:110,height:110,correctLevel:QRCode.CorrectLevel.M});});
}

/* ============ 啟動 ============ */
(async function(){
  try{await loadMasters();listenLive();}catch(e){console.error(e);toast("連線 Firebase 失敗，請檢查網路","bad");}
  route();
})();
</script>
</body>
</html>
