<style>
:root{--navy:#0E5C63;--navy2:#0a474d;--amber:#E08D2B;--bg:#f4f7f8;--card:#fff;--line:#dfe7e8;--text:#1f2933;--mut:#6b7785;--ok:#1f9d57;--bad:#c0392b;--blue:#1c5fb0}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:"Microsoft JhengHei","PingFang TC",system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:15px}
header{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;padding:13px 16px;position:sticky;top:0;z-index:20;display:flex;justify-content:space-between;align-items:center}
header .t{font-size:16px;font-weight:700}header .t small{font-weight:400;opacity:.85;font-size:12px}
header button{background:rgba(255,255,255,.16);color:#fff;border:0;border-radius:8px;padding:7px 11px;font-size:13px;font-family:inherit;margin-left:6px}
main{padding:14px;max-width:760px;margin:0 auto;padding-bottom:50px}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:14px}
.card h3{margin:0 0 12px;font-size:15px;color:var(--navy)}
label{display:block;font-size:13px;color:var(--mut);margin:10px 0 4px;font-weight:600}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);border-radius:9px;font-size:15px;font-family:inherit;background:#fff}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--navy)}
.row{display:flex;gap:10px}.row>*{flex:1}
button.act{background:var(--navy);color:#fff;border:0;border-radius:10px;padding:14px;font-size:16px;font-weight:700;width:100%;font-family:inherit;margin-top:14px}
button.act:active{background:var(--navy2)}button.act.done{background:var(--ok)}
button.sec{background:#eef3f2;color:var(--navy);border:1px solid var(--line);border-radius:9px;padding:9px 12px;font-weight:600;font-family:inherit;font-size:13px}
button.mini{background:#fff;border:1px solid var(--line);border-radius:7px;padding:5px 9px;font-size:12px;font-family:inherit;color:var(--navy);font-weight:600}
button.danger{background:#fbe9e7;color:var(--bad);border:1px solid #f3c9c3}
.big{font-size:20px;font-weight:800;color:var(--navy)}
.matline{display:flex;gap:8px;align-items:flex-end;margin-bottom:8px}.matline>div{flex:1}.matline .qy{flex:0 0 70px}.matline .rm{flex:0 0 36px}
.rm button{background:#fbe9e7;color:var(--bad);border:0;border-radius:8px;width:36px;height:44px;font-size:18px}
.wo{border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:8px;background:#fff}
.wo .id{font-weight:700;color:var(--navy)}.wo .meta{font-size:12px;color:var(--mut);margin-top:3px}
.pill{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:700;display:inline-block}
.s-待派工{background:#eceff1;color:#546e7a}.s-已派工{background:#fff8e1;color:#a17400}.s-進行中{background:#e3f0ff;color:var(--blue)}.s-已完成{background:#e6f6ec;color:var(--ok)}.s-待料{background:#fff3e0;color:#b45309}
.src-保養{background:#e3f0ff;color:var(--blue)}.src-維修{background:#fdecea;color:var(--bad)}.src-優化{background:#f3e8ff;color:#7b3fb5}.src-故障叫修{background:#fdecea;color:var(--bad)}
.tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px}
.tabs button{flex:0 0 auto;border:1px solid var(--line);background:#fff;border-radius:9px;padding:9px 12px;font-weight:700;color:var(--mut);font-family:inherit;font-size:13px;white-space:nowrap}
.tabs button.on{background:var(--navy);color:#fff;border-color:var(--navy)}
table{width:100%;border-collapse:collapse;font-size:13px}th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}th{color:var(--mut)}td.n,th.n{text-align:right}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#222;color:#fff;padding:12px 20px;border-radius:24px;font-size:15px;z-index:60;opacity:0;transition:.25s;pointer-events:none;max-width:90%;text-align:center}
.toast.show{opacity:1}.toast.ok{background:var(--ok)}.toast.bad{background:var(--bad)}
.hide{display:none}.hint{font-size:12px;color:var(--mut);line-height:1.6;margin-top:6px}.center{text-align:center}.mut{color:var(--mut)}
.qrgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.qrcell{border:1px solid var(--line);border-radius:8px;padding:8px;text-align:center}

.landing{max-width:440px;margin:7vh auto;text-align:center}.landing .logo{font-size:52px}.landing h1{color:var(--navy);margin:6px 0}

.b-eng{background:var(--navy);color:#fff}.b-adm{background:#fff;color:var(--navy);border:2px solid var(--navy)!important}
.namegrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}.namegrid button{padding:18px;font-size:17px;font-weight:700;border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--navy);font-family:inherit}

.b-inv{background:#1c5fb0;color:#fff}
.b-photo{background:#f3e8ff;color:#7b3fb5;border:1px solid #d8b4fe;border-radius:10px;padding:10px 14px;font-weight:700;font-family:inherit;font-size:14px;cursor:pointer}
.photo-wrap{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.photo-thumb{width:72px;height:72px;object-fit:cover;border-radius:9px;cursor:pointer;border:1px solid var(--line)}

.inv-section{margin-bottom:6px}
.inv-tbl-hdr{display:grid;grid-template-columns:72px 100px 1fr 108px 120px 52px 44px auto;gap:4px;padding:6px 8px;background:var(--sub);border-radius:7px;font-size:11px;font-weight:700;color:var(--mut);margin:6px 0 2px;position:sticky;top:0;z-index:2}
.inv-tbl-row{display:grid;grid-template-columns:72px 100px 1fr 108px 120px 52px 44px auto;gap:4px;align-items:center;padding:7px 8px;border-bottom:1px solid var(--line);font-size:13px}

.col-id{font-size:11px;color:var(--navy);font-weight:700;word-break:break-all}
.col-cat{font-size:11px;color:#555}
.col-nm .sub{font-size:10px;color:var(--mut);margin-top:1px}

.col-qty{font-size:16px;font-weight:800;text-align:center}
.col-unit{font-size:11px;color:var(--mut);text-align:center}

.inv-row{display:none}

.inv-nm{display:none}

.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}

function getInvMats(){
  const out=[]; const seen=new Set();
  SEED_MAT.forEach(s=>{
    const f=MAT[s.id]||{};
    out.push({
      id:s.id, cat:s.cat, catname:s.catname||CAT_MAP[s.cat]||s.cat,
      name:s.name, model:s.model||"", equip:f.equip||s.equip||"",
      unit:f.unit||s.unit||"", brand:s.brand||f.brand||"",
      partno:s.partno||f.partno||"",
      loc:f.loc!=null&&f.loc!==undefined?f.loc:s.loc||"",
      qty:f.qty!=null?+f.qty:(s.qty!=null?+s.qty:0),
      price:f.price!=null?f.price:s.price||1,
      photo:f.photo||s.photo||"",
    });
    seen.add(s.id);
  });
  // 手動新增（不在 SEED_MAT 裡的 Firebase 項目）
  Object.values(MAT).forEach(f=>{if(!seen.has(f.id))out.push(f);});
  return out.sort((a,b)=>a.id<b.id?-1:1);
}

function nextDueFrom(months,from){if(!months||!months.length)return ymd(new Date(from.getTime()+30*864e5));const y=from.getFullYear(),mo=from.getMonth()+1,s=[...months].sort((a,b)=>a-b);let c=null;for(const mm of s){if(mm>=mo){c=new Date(y,mm-1,1);break;}}if(!c)c=new Date(y+1,s[0]-1,1);return ymd(c);}
function rollDue(months){const n=new Date();return nextDueFrom(months,new Date(n.getFullYear(),n.getMonth()+1,1));}
function planDue(p){return p.active!==false&&p.nextDue&&p.nextDue<=todayStr();}

function route(){const h=location.hash||"";

  if(h.indexOf("#scan=")===0)return engScan(h.slice(6));
  if(h.indexOf("#report=")===0)return faultView(h.slice(8));
  // Legacy routes redirect to new sections
  if(h==="#eng")return sectionTasks();
  if(h.indexOf("#pivot")===0)return sectionDispatch(h);
  if(h==="#myperf")return sectionEngineers();
  if(h==="#eng_pick")return engPickEquip();
  // New workflow-driven routes
  if(h==="#tasks")return sectionTasks();
  if(h==="#dispatch"||h.indexOf("#dispatch?")===0)return sectionDispatch(h);
  if(h==="#equipment"||h.indexOf("#equipment/")===0)return sectionEquipment(h);
  if(h==="#engineers"||h.indexOf("#engineers/")===0)return sectionEngineers(h);
  if(h==="#analytics")return sectionAnalytics();
  if(h==="#admin"||h==="#admin-v2")return sectionAdmin();
  if(h==="#inventory")return sectionAdmin("inventory");
  sectionDashboard();}

async function submitReport(eqid,woKey){
  const hasMat=mLines.some(l=>l.id&&l.qty>0);
  const prog=hasMat?"進行中":$("#r_prog").value, hr=+$("#r_hr").value||0,
        item=$("#r_item").value, note=$("#r_note").value,
        src=$("#r_src")?$("#r_src").value:"保養";
  const engineers=rEngineers.length>0?[...rEngineers]:[ENGINEER||""];
  const by=engineers[0]||ENGINEER||"";
  const totalHours=+(hr*engineers.length).toFixed(1);
  const mats=(typeof getInvMats==="function"?getInvMats():matArr());
  const materials=mLines.filter(l=>l.id&&l.qty).map(l=>{const m=mats.find(x=>x.id===l.id);return{id:l.id,name:m?m.name:l.id,qty:l.qty};});
  $("#r_submit").disabled=true;$("#r_submit").textContent="送出中…";
  try{const now=Date.now();let woId=woKey;
    if(!woKey){const ref=ROOT.child("workorders").push();await ref.set({id:"WO-"+dStr(now).replace(/-/g,"")+"-"+String(now).slice(-4),source:src,equip:eqid,equipName:(EQUIP[eqid]||{}).name||"",item:item,assignedTo:by,priority:"中",status:prog,createdAt:now,from:"engineer"});woId=ref.key;}
    else{await ROOT.child("workorders/"+woKey).update({status:prog,item:item||WOS[woKey].item,assignedTo:WOS[woKey].assignedTo||by,finishAt:prog==="已完成"?now:null});if(prog==="已完成"&&WOS[woKey]&&WOS[woKey].planId){const pl=PLANS[WOS[woKey].planId];if(pl){await ROOT.child("plans/"+WOS[woKey].planId).update({lastDone:todayStr(),nextDue:rollDue(pl.months||[])});}}}
    await ROOT.child("reports").push().set({woKey:woId,equip:eqid,equipName:(EQUIP[eqid]||{}).name||"",reporter:by,reporters:engineers,progress:prog,hours:hr,totalHours,materials,note,source:src,createdAt:now});
    // 若有使用耗材 → 建立領料申請（不立即扣庫存，由倉管確認後發料）
    if(materials.length>0){
      await ROOT.child("requisitions").push().set({
        woKey:woId,equip:eqid,equipName:(EQUIP[eqid]||{}).name||"",
        reporter:by,reporters:engineers,materials,
        status:"待發料",requestedAt:now,note,
        confirmedAt:null,confirmedBy:null
      });
    }
    $("#r_submit").className="act done";$("#r_submit").textContent="✓ 已送出";
    const engMsg=engineers.length>1?" ("+engineers.join("、")+"，總工時 "+totalHours+"h)":"";
    const matMsg=materials.length>0?"，已建立領料申請 "+materials.length+" 項（待倉管確認發料）":"";
    toast("報工已送出，謝謝 "+by+engMsg+matMsg,"ok");
    setTimeout(()=>location.hash="#pivot",900);
  }catch(e){toast("送出失敗："+e.message,"bad");$("#r_submit").disabled=false;$("#r_submit").textContent="送出報工";}}

window.exportEqCSV=function(){

window.exportMatCSV=function(){
  const cols=["MaterialID","品項","廠牌","規格型號","單位","儲位","單價"];
  const rows=[cols.join(",")].concat(matArr().map(m=>[m.id,m.name,m.brand||"",m.model||"",m.unit||"",m.loc||"",m.price||0].map(x=>`"${String(x).replace(/"/g,'""')}"`).join(",")));

};
window.importMatCSV=function(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async function(e){
    const lines=e.target.result.split(/\r?\n/).filter(l=>l.trim());
    if(lines.length<2)return toast("CSV 無資料","bad");
    let ok=0,fail=0;
    for(const line of lines.slice(1)){
      const cols=line.split(",").map(c=>c.replace(/^"|"$/g,"").replace(/""/g,'"'));
      const [id,name,brand,model,unit,price]=cols;
      if(!id||!name){fail++;continue;}
      await ROOT.child("material/"+id).set({id,name,cat:(MAT[id]||{}).cat||"",brand:brand||"",model:model||"",unit:unit||"",price:+price||0});
      ok++;
    }
    await loadMasters();toast(`匯入完成：${ok} 筆，失敗 ${fail} 筆`,"ok");admMaster();
  };
  reader.readAsText(file,"UTF-8");
};
function dlCSV(rows,filename){
  const blob=new Blob(["\ufeff"+rows.join("\n")],{type:"text/csv"});
  const a=el("a",{href:URL.createObjectURL(blob),download:filename});a.click();
}

function admCost(){const reps=repArr();let tot=0,byMon={},byType={保養:0,維修:0,優化:0,故障叫修:0};

const TW_HOLIDAYS_2026=new Set(["2026-01-01","2026-01-02","2026-01-28","2026-01-29","2026-01-30","2026-01-31","2026-02-02","2026-02-03","2026-02-04","2026-02-27","2026-02-28","2026-03-01","2026-04-03","2026-04-04","2026-04-05","2026-04-06","2026-05-01","2026-06-19","2026-09-18","2026-10-09","2026-10-10","2026-12-25","2026-12-31"]);
function nextWorkday(dateStr){
  let d=new Date(dateStr+"T00:00:00");
  let n=0;
  while(n<14){const w=d.getDay(),s=d.toISOString().slice(0,10);if(w!==0&&w!==6&&!TW_HOLIDAYS_2026.has(s))return s;d=new Date(d.getTime()+864e5);n++;}
  return dateStr;
}
function isHoliday(dateStr){const d=new Date(dateStr+"T00:00:00");return d.getDay()===0||d.getDay()===6||TW_HOLIDAYS_2026.has(dateStr);}
function planDueFromYearStart(months,cycleDays,year){
  year=year||new Date().getFullYear();
  const from=new Date(year,0,1);
  return nextWorkday(nextDueFrom(months,from));
}

    o[pid]={id:pid,eqId:p.eqId,eqName:p.eqName,seq:p.seq,item:p.item,cycle:p.cycle,cycleDays:p.cycleDays,months:p.months,assignedTo:"",lastDone:null,nextDue:due,origDue:raw,isHolidayAdj:holiday,active:true};

};

    <button class="sec" style="margin-top:8px" onclick="window.print()">🖨️ 列印此頁全部 QR</button></div>
    <div class="card"><h3>區域叫修 QR（${ars.length}）</h3><div class="qrgrid" id="qra"></div></div>
    <div class="card"><h3>設備報工 QR（${eqs.length}）</h3><div class="qrgrid" id="qre"></div></div>`;
  const ga=$("#qra");ars.forEach(a=>{const cell=el("div",{className:"qrcell"});const box=el("div");cell.appendChild(box);cell.appendChild(el("div",{className:"lbl",textContent:"報修 "+a.code}));cell.appendChild(el("div",{className:"nm",textContent:a.name}));ga.appendChild(cell);new QRCode(box,{text:baseUrl()+"#report="+a.code,width:110,height:110,correctLevel:QRCode.CorrectLevel.M});});
  const ge=$("#qre");eqs.forEach(e=>{const cell=el("div",{className:"qrcell"});const box=el("div");cell.appendChild(box);cell.appendChild(el("div",{className:"lbl",textContent:e.id}));cell.appendChild(el("div",{className:"nm",textContent:e.name}));ge.appendChild(cell);new QRCode(box,{text:baseUrl()+"#scan="+e.id,width:110,height:110,correctLevel:QRCode.CorrectLevel.M});});}

const INV_PIN_KEY="invPin"; // stored in maintenance/config/invPin, default = admin PIN
function invHeader(){
  const pending=Object.values(REQS).filter(r=>r.status==="待發料").length;
  const badge=pending>0?`<span style="background:#ef4444;color:#fff;border-radius:10px;padding:1px 7px;font-size:12px;margin-left:4px">${pending}</span>`:"";
  return `<header><div class="t">📦 耗材庫存管理 <small>${invAuthed?"(管理員)":"(唯讀)"}</small></div><div>${invAuthed?`<button onclick="invAuthed=false;invView()">登出管理</button>`:""}<button onclick="location.hash=''">首頁</button></div></header>${pending&&invAuthed?`<div style="background:#fef3c7;padding:8px 14px;font-size:13px;text-align:center;cursor:pointer" onclick="document.getElementById('inv_reqs')?.scrollIntoView({behavior:'smooth'})">⚠️ 有 ${pending} 筆待發料申請${badge}</div>`:""}`;
}

window.toggleInvCat=function(cat){
  const c=window._invCollapsed=window._invCollapsed||{};
  c[cat]=!c[cat];
  const body=document.getElementById("ibody_"+cat);
  const hd=document.getElementById("icat_"+cat);
  if(!body)return invView();  // fallback: full re-render
  // if opening and body is empty, need to re-render (was collapsed when built)
  if(!c[cat]&&body.innerHTML.trim()===""){invView();return;}
  body.style.display=c[cat]?"none":"block";
  if(hd){const arr=hd.querySelector("span:last-child");if(arr)arr.textContent=c[cat]?"▼":"▲";}
};
window.invExpandAll=function(collapse){
  window._invCollapsed={};
  if(collapse){
    document.querySelectorAll("[id^='ibody_']").forEach(el=>{const cat=el.id.replace("ibody_","");window._invCollapsed[cat]=true;});
  }
  invView();
};
function invLogin(){

    <label style="text-align:left">管理員 PIN</label>
    <input id="inv_pin" type="password" inputmode="numeric" placeholder="輸入 PIN">

    <button class="sec" style="width:100%;margin-top:10px" onclick="location.hash='#inventory'">返回（唯讀查看）</button></div>`;

window.invTryPin=function(){
  const p=$("#inv_pin").value;
  const correct=CONF.invPin||CONF.pin||"1234";
  if(p===correct){invAuthed=true;toast("庫存管理員已登入","ok");invView();}
  else toast("PIN 錯誤","bad");
};
window.setMatLoc=async function(id){
  const inp=document.getElementById("iloc_"+id);
  if(!inp)return;
  const val=inp.value.trim();
  try{
    await ROOT.child("material/"+id+"/loc").set(val||null);
    if(MAT[id])MAT[id].loc=val||null;
    toast("儲位已更新 "+id,"ok");
  }catch(e){toast("更新失敗："+e.message,"bad");}
};
window.invExportCSV=function(){
  if(typeof XLSX==="undefined"){toast("XLSX 函式庫載入中，請稍後再試","bad");return;}
  const mats=getInvMats();
  const dateStr=todayStr();
  const wb=XLSX.utils.book_new();
  // ── Sheet1: 耗材主檔草稿 ──────────────────────────────────
  const NAVY="0E5C63", WHITE="FFFFFF";
  const OK_FILL="E6F6EC", WARN_FILL="FFF8E1", NO_FILL="FFFFFF";
  const hdrs=["項次","料號","耗材編號","大類","大類名稱","品項名稱","規格/型號",
               "歸屬設備編號","設備名稱","存放位置","庫存","單位","料號(Incomec)","備註"];
  const data=mats.map((m,idx)=>{
    const eqNm=(EQUIP[m.equip]||{}).name||"";
    return [idx+1, m.partno||"", m.id, m.cat, m.catname||CAT_MAP[m.cat]||"",
            m.name, m.model||"", m.equip||"", eqNm,
            m.loc||"", m.qty!=null?+m.qty:"", m.unit||"",
            m.partno||"", m.brand||""];
  });
  const wsData=[
    ["BFY 工務報工制度 — 易損件耗材主檔 ("+dateStr+")"],
    ["匯出自系統現況，庫存數量為即時值。"],
    [],
    hdrs,
    ...data
  ];
  const ws1=XLSX.utils.aoa_to_sheet(wsData);
  // 欄寬 (符合 v4 格式)
  ws1["!cols"]=[
    {wch:6},{wch:10},{wch:12},{wch:8},{wch:14},{wch:30},{wch:28},
    {wch:16},{wch:28},{wch:14},{wch:8},{wch:8},{wch:12},{wch:20}
  ];
  // 合併標題列
  ws1["!merges"]=[
    {s:{r:0,c:0},e:{r:0,c:13}},
    {s:{r:1,c:0},e:{r:1,c:13}},
  ];
  // 樣式套用 (SheetJS 免費版用 !cell 格式寫入)
  const hdrFill={fgColor:{rgb:NAVY},patternType:"solid"};
  const hdrFont={name:"Arial",bold:true,color:{rgb:WHITE},sz:10};
  const titleFont={name:"Arial",bold:true,color:{rgb:NAVY},sz:14};
  for(let c=0;c<hdrs.length;c++){
    const addr=XLSX.utils.encode_cell({r:3,c});
    if(!ws1[addr])ws1[addr]={v:hdrs[c],t:"s"};
    ws1[addr].s={fill:hdrFill,font:hdrFont,alignment:{horizontal:"center",vertical:"center",wrapText:true}};
  }
  // 標題樣式
  const a1=XLSX.utils.encode_cell({r:0,c:0});
  if(ws1[a1])ws1[a1].s={font:titleFont};
  // 資料行底色 (按是否有設備對應)
  data.forEach((row,ri)=>{
    const hasEq=!!row[7]; // equip field
    const fillRgb=hasEq?OK_FILL:WARN_FILL;
    const rowFill={fgColor:{rgb:fillRgb},patternType:"solid"};
    const font={name:"Arial",sz:10};
    for(let c=0;c<hdrs.length;c++){
      const addr=XLSX.utils.encode_cell({r:4+ri,c});
      if(!ws1[addr])ws1[addr]={v:"",t:"s"};
      ws1[addr].s={fill:rowFill,font,alignment:{vertical:"center",wrapText:false}};
    }
  });
  XLSX.utils.book_append_sheet(wb,ws1,"耗材主檔草稿");
  // ── Sheet2: 大類統計 ─────────────────────────────────────
  const catCount={};
  mats.forEach(m=>{
    if(!catCount[m.cat])catCount[m.cat]={cat:m.cat,name:m.catname||CAT_MAP[m.cat]||"",count:0,withLoc:0,totalQty:0};
    catCount[m.cat].count++;
    if(m.loc)catCount[m.cat].withLoc++;
    catCount[m.cat].totalQty+=(m.qty||0);
  });
  const statHdrs=["大類代碼","大類名稱","品項數","有儲位","庫存總數"];
  const statData=Object.values(catCount).sort((a,b)=>a.cat<b.cat?-1:1).map(x=>[x.cat,x.name,x.count,x.withLoc,x.totalQty]);
  const ws2=XLSX.utils.aoa_to_sheet([statHdrs,...statData]);
  ws2["!cols"]=[{wch:10},{wch:16},{wch:10},{wch:8},{wch:10}];
  for(let c=0;c<statHdrs.length;c++){
    const addr=XLSX.utils.encode_cell({r:0,c});
    if(!ws2[addr])ws2[addr]={v:statHdrs[c],t:"s"};
    ws2[addr].s={fill:{fgColor:{rgb:NAVY},patternType:"solid"},font:{name:"Arial",bold:true,color:{rgb:WHITE},sz:10}};
  }
  XLSX.utils.book_append_sheet(wb,ws2,"大類統計");
  // ── Sheet3: 設備主檔(查詢用) ─────────────────────────────
  const eqHdrs=["設備編號","設備名稱","線別","狀態"];
  const eqData=eqArr().map(e=>[e.id,e.name,e.line||"",e.status||""]);
  const ws3=XLSX.utils.aoa_to_sheet([eqHdrs,...eqData]);
  ws3["!cols"]=[{wch:16},{wch:28},{wch:14},{wch:10}];
  for(let c=0;c<eqHdrs.length;c++){
    const addr=XLSX.utils.encode_cell({r:0,c});
    if(!ws3[addr])ws3[addr]={v:eqHdrs[c],t:"s"};
    ws3[addr].s={fill:{fgColor:{rgb:NAVY},patternType:"solid"},font:{name:"Arial",bold:true,color:{rgb:WHITE},sz:10}};
  }
  XLSX.utils.book_append_sheet(wb,ws3,"設備主檔(查詢用)");
  // ── 輸出 ─────────────────────────────────────────────────
  try{
    XLSX.writeFile(wb,"易損件耗材主檔_"+dateStr+".xlsx");
    toast("已匯出 XLSX（"+mats.length+"筆，3個分頁）","ok");

window.confirmReq=async function(rk,approve){
  const req=REQS[rk];if(!req)return toast("找不到申請單","bad");
  if(approve){
    if(!confirm(`確認發料？\n設備：${req.equipName||req.equip}\n品項：${req.materials.map(m=>m.name+"×"+m.qty).join("、")}\n\n確認後庫存將立即扣減。`))return;
    const now=Date.now();
    const by=ENGINEER||"倉管";
    // 逐筆扣庫存
    for(const mat of req.materials){
      const cur=+(MAT[mat.id]||{}).qty;
      if(cur==null||isNaN(cur))continue;
      const nq=Math.max(0,cur-mat.qty);
      await ROOT.child("material/"+mat.id+"/qty").set(nq);
      if(MAT[mat.id])MAT[mat.id].qty=nq;
      await ROOT.child("stocklog").push().set({matId:mat.id,matName:mat.name,type:"out",delta:mat.qty,before:cur,after:nq,by,woKey:req.woKey||"",ts:now});
    }
    await ROOT.child("requisitions/"+rk).update({status:"已發料",confirmedAt:now,confirmedBy:by});
    if(REQS[rk])Object.assign(REQS[rk],{status:"已發料",confirmedAt:now,confirmedBy:by});
    await logAudit("confirm","確認發料 "+req.equip+" / "+req.materials.map(m=>m.name+"×"+m.qty).join("、"));
    toast("已發料完成，庫存已扣減","ok");
  }else{
    if(!confirm(`取消申請單？\n設備：${req.equipName||req.equip}`))return;
    await ROOT.child("requisitions/"+rk).update({status:"已取消",confirmedAt:Date.now(),confirmedBy:ENGINEER||"倉管"});
    if(REQS[rk])REQS[rk].status="已取消";
    toast("申請已取消","ok");
  }
  await loadMasters();invView();
};
window.handleImportXLSX=async function(input){
  if(!invAuthed)return toast("需管理員登入","bad");
  if(typeof XLSX==="undefined")return toast("XLSX 函式庫未載入，請重新整理頁面","bad");
  const file=input.files[0];if(!file)return;
  if(!file.name.match(/\.xlsx?$/i))return toast("請選擇 .xlsx 或 .xls 檔案","bad");
  const reader=new FileReader();
  reader.onload=async function(ev){
    try{
      const wb=XLSX.read(new Uint8Array(ev.target.result),{type:"array"});
      // 讀「耗材主檔草稿」分頁（與匯出格式一致）
      const sheetName=wb.SheetNames.find(s=>s.includes("耗材主檔")) || wb.SheetNames[0];
      const ws=wb.Sheets[sheetName];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
      // 找 header 列（包含「耗材編號」的列）
      let hdrRow=-1;
      for(let r=0;r<Math.min(8,rows.length);r++){
        if(rows[r].some(v=>String(v).includes("耗材編號"))){hdrRow=r;break;}
      }
      if(hdrRow<0)return toast("找不到標題列（需含「耗材編號」）","bad");
      const hdrs=rows[hdrRow].map(v=>String(v||"").trim());
      // 欄位對應（與匯出格式一致）
      const col={
        id:    hdrs.findIndex(h=>h.includes("耗材編號")),
        cat:   hdrs.findIndex(h=>h==="大類"||h==="大類代碼"),
        catname:hdrs.findIndex(h=>h.includes("大類名稱")),
        name:  hdrs.findIndex(h=>h.includes("品項名稱")),
        model: hdrs.findIndex(h=>h.includes("規格")||h.includes("型號")),
        equip: hdrs.findIndex(h=>h.includes("歸屬設備")),
        loc:   hdrs.findIndex(h=>h.includes("存放位置")||h.includes("儲位")),
        qty:   hdrs.findIndex(h=>h.includes("庫存")),
        unit:  hdrs.findIndex(h=>h==="單位"),
        partno:hdrs.findIndex(h=>h.includes("料號")),
      };
      const dataRows=rows.slice(hdrRow+1).filter(r=>r[col.id]&&String(r[col.id]).trim());
      if(!dataRows.length)return toast("沒有找到有效資料行","bad");
      if(!confirm(`⚠️ 即將用 XLSX 中的 ${dataRows.length} 筆資料\n完全取代 Firebase 現有耗材主檔（${Object.keys(MAT).length} 筆）。\n\n此操作不可回復，確定匯入？`))return;
      toast("匯入中，請稍候…","");
      const mo={};
      dataRows.forEach(r=>{
        const id=String(r[col.id]||"").trim();
        if(!id)return;
        const qty=col.qty>=0?r[col.qty]:"";
        mo[id]={
          id,
          cat:      col.cat>=0?String(r[col.cat]||"").trim():"",
          catname:  col.catname>=0?String(r[col.catname]||"").trim():"",
          name:     col.name>=0?String(r[col.name]||"").trim():id,
          model:    col.model>=0?String(r[col.model]||"").trim():"",
          equip:    col.equip>=0?String(r[col.equip]||"").trim():"",
          loc:      col.loc>=0?String(r[col.loc]||"").trim():"",
          qty:      qty!==""&&qty!=="—"?+qty||0:0,
          unit:     col.unit>=0?String(r[col.unit]||"").trim():"",
          partno:   col.partno>=0?String(r[col.partno]||"").trim():"",
          price:    (MAT[id]||{}).price||1,   // 保留現有單價
          photo:    (MAT[id]||{}).photo||"",  // 保留現有照片
        };
      });
      await ROOT.child("material").set(mo);
      await logAudit("import","XLSX匯入耗材主檔："+Object.keys(mo).length+"筆，取代原有"+Object.keys(MAT).length+"筆");
      await loadMasters();
      toast("✅ 匯入完成："+Object.keys(mo).length+" 筆耗材已更新","ok");
      invView();
    }catch(e){
      toast("匯入失敗："+e.message,"bad");
      console.error(e);
    }
  };
  reader.readAsArrayBuffer(file);
  input.value="";
};
window.handleBatchLoc=async function(input){
  if(!invAuthed)return toast("需管理員登入","bad");
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async function(ev){
    const lines=ev.target.result.replace(/\r/g,"").split("\n").filter(l=>l.trim());
    if(lines.length<2)return toast("CSV 無資料","bad");
    // 跳過 header（若第一行看起來是 header）
    const start=isNaN(lines[0].split(",")[0])?1:0;
    let ok=0,skip=0;
    for(const line of lines.slice(start)){
      const parts=line.split(",").map(c=>c.replace(/^"|"$/g,"").trim());
      const [id,loc]=parts;
      if(!id||!MAT[id]){skip++;continue;}
      await ROOT.child("material/"+id+"/loc").set(loc||null);
      if(MAT[id])MAT[id].loc=loc||null;
      ok++;
    }
    toast(`批次更新完成：${ok} 筆，跳過 ${skip} 筆`,"ok");
    invView();
  };
  reader.readAsText(file,"UTF-8");
  input.value="";
};

};

window.handlePhotoUpload=async function(srcInput){
  // 允許從兩個 input（相簿/相機）呼叫
  const inp=srcInput||document.getElementById("inv_photo_input")||document.getElementById("inv_photo_cam");
  const type=document.getElementById("inv_photo_target_type").value;
  const id=document.getElementById("inv_photo_target_id").value;
  if(!inp||!inp.files[0])return;
  const file=inp.files[0];
  const reader=new FileReader();
  reader.onload=async function(ev){
    try{
      // 壓縮到 ≤ 200KB
      const img2=new Image();
      img2.onload=async function(){
        const canvas=document.createElement("canvas");
        const MAX=600; let w=img2.width,h=img2.height;
        if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
        if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
        canvas.width=w;canvas.height=h;
        const ctx=canvas.getContext("2d");ctx.drawImage(img2,0,0,w,h);
        const b64=canvas.toDataURL("image/jpeg",0.75);
        const node=type==="mat"?"material/"+id+"/photo":"equipment/"+id+"/photo";
        await ROOT.child(node).set(b64);
        if(type==="mat"&&MAT[id])MAT[id].photo=b64;

        toast("照片已上傳","ok");

      };
      img2.src=ev.target.result;
    }catch(e){toast("上傳失敗："+e.message,"bad");}
  };
  reader.readAsDataURL(file);
  inp.value="";
};

/* ===== Role Model ===== */
function resolveRole(name){
  if(!name)return"ENG";
  const rec=Object.values(ROSTER).find(r=>r.name===name&&r.active!==false);
  return rec?rec.role:"ENG";
}

function updateBNav(hash){
  const nav=document.getElementById("bnav");if(!nav)return;
  let active="dashboard";
  if(hash==="#tasks"||hash==="#eng")active="tasks";
  else if(hash==="#dispatch"||hash.indexOf("#dispatch?")===0||hash.indexOf("#pivot")===0)active="dispatch";
  else if(hash==="#equipment"||hash.indexOf("#equipment/")===0)active="equipment";
  else if(hash==="#engineers"||hash.indexOf("#engineers/")===0||hash==="#myperf")active="engineers";
  else if(hash==="#analytics")active="analytics";
  else if(hash==="#admin"||hash==="#admin-v2"||hash==="#inventory")active="admin";
  nav.querySelectorAll(".bn-item").forEach(b=>b.classList.toggle("on",b.dataset.section===active));
  // Badge: pending WOs on Dispatch icon
  const pending=woArr().filter(w=>w.status==="待派工").length;

  if(bd){bd.textContent=pending||"";bd.classList.toggle("show",pending>0);}

  const myNew=ENGINEER?woArr().filter(w=>w.assignedTo===ENGINEER&&w.status==="已派工").length:0;
  const bt=document.getElementById("badge-tasks");

}

function sectionDashboard(){
  const today=todayStr();
  const pending=woArr().filter(w=>w.status==="待派工").length;
  const inProg=woArr().filter(w=>w.status==="進行中").length;
  const waiting=woArr().filter(w=>w.status==="待料").length;
  const overdue=woArr().filter(w=>w.due&&w.due<today&&w.status!=="已完成").length;
  const emergency=woArr().filter(w=>w.urgency==="緊急"&&["已派工","進行中"].includes(w.status));
  const myOpen=ENGINEER?woArr().filter(w=>w.assignedTo===ENGINEER&&w.status!=="已完成"):[];
  const todayPM=planArr().filter(p=>p.nextDue===today).length;
  const waitParts=Object.values(REQS).filter(r=>!r.confirmedAt).length;

  const identityBanner=!ENGINEER?`<div class="card" style="border:2px dashed var(--amber);text-align:center;padding:20px">
    <div style="font-size:15px;margin-bottom:10px">請先選擇身分，以查看個人工單</div>
    <button class="act" style="margin:0 auto;max-width:200px" onclick="showIdentityPicker()">選擇身分</button>
  </div>`:"";

  const emergBanner=emergency.length?`<div class="emerg-banner">
    <div><strong style="color:var(--bad)">⚠ ${emergency.length} 件緊急搶修進行中</strong></div>
    <button class="mini" onclick="location.hash='#dispatch'">查看 ›</button>
  </div>`:"";

  const myCard=ENGINEER&&myOpen.length?`<div class="card"><h3>我的工單（${myOpen.length}）</h3>
    ${myOpen.slice(0,3).map(w=>`<div class="wo"><div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div><div class="id">${esc(w.id||w._k)}</div>
      <div class="meta">${esc(w.equipName||w.equip||"")} · ${esc(w.item||w.symptom||"")}</div></div>
      <span class="pill s-${w.status||"待派工"}">${w.status||"待派工"}</span></div></div>`).join("")}
    ${myOpen.length>3?`<div style="text-align:center;margin-top:8px"><button class="sec" onclick="location.hash='#tasks'">查看全部 ${myOpen.length} 筆 ›</button></div>`:""}
  </div>`:"";

  APP().innerHTML=navHeader("工務報工系統")+`<main>
    ${identityBanner}
    ${emergBanner}
    <div class="dash-grid">
      <div class="dash-widget dw-warn" onclick="location.hash='#dispatch'">
        <div class="dw-val">${pending}</div><div class="dw-label">待派工</div>
      </div>
      <div class="dash-widget dw-neutral" onclick="location.hash='#dispatch'">
        <div class="dw-val">${inProg}</div><div class="dw-label">進行中</div>
      </div>
      <div class="dash-widget ${overdue>0?"dw-urgent":"dw-ok"}" onclick="location.hash='#dispatch'">
        <div class="dw-val">${overdue}</div><div class="dw-label">逾期工單</div>
      </div>
      <div class="dash-widget dw-neutral" onclick="location.hash='#admin'">
        <div class="dw-val">${waiting}</div><div class="dw-label">待料</div>
      </div>
      <div class="dash-widget dw-neutral" onclick="location.hash='#equipment'">
        <div class="dw-val">${todayPM}</div><div class="dw-label">今日保養</div>
      </div>
      <div class="dash-widget ${waitParts>0?"dw-warn":"dw-neutral"}" onclick="location.hash='#admin'">
        <div class="dw-val">${waitParts}</div><div class="dw-label">等待發料</div>
      </div>
    </div>
    ${myCard}
    <div class="card dw-wide"><div style="font-size:12px;font-weight:700;color:var(--mut);margin-bottom:8px">本週 KPI（Sprint 2 完整版）</div>
      <div class="kpi" style="margin:0">
        <div class="b"><div class="v">${woArr().filter(w=>w.status==="已完成"&&(w.finishAt||0)>=weekStart()).length}</div><div class="l">完工</div></div>
        <div class="b"><div class="v">${repArr().filter(r=>(r.createdAt||0)>=weekStart()).reduce((s,r)=>s+(+r.hours||0),0).toFixed(1)}</div><div class="l">工時 (h)</div></div>
        <div class="b"><div class="v">—</div><div class="l">MTTR (h)</div></div>
      </div>
    </div>
    <div class="card dw-wide"><h3>近期動態</h3>
      ${AUDITLOG.length?AUDITLOG.slice(0,8).map(e=>`<div class="activity-line">${esc(e.action||"")}${e.detail?`：${esc(e.detail)}`:""}
        <span class="activity-ts"> · ${esc(e.by||"")} · ${new Date(e.ts||0).toLocaleString("zh-TW",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"})}</span></div>`).join(""):
        '<div class="hint">載入中…</div>'}
      ${AUDITLOG.length?`<button class="sec" style="width:100%;margin-top:8px" onclick="location.hash='#admin'">查看完整記錄 ›</button>`:""}
    </div>
  </main>`;
}
function weekStart(){const d=new Date();const day=d.getDay()||7;d.setDate(d.getDate()-(day-1));d.setHours(0,0,0,0);return d.getTime();}

/* ===== Section: Equipment ===== */
function sectionEquipment(hash){
  const eqs=eqArr();
  const lines=[...new Set(eqs.map(e=>e.line||"其他").filter(Boolean))].sort();
  let lineFilter=sectionEquipment._line||(lines[0]||"");
  // Parse equipment detail route: #equipment/{id}
  if(hash&&hash.indexOf("#equipment/")===0){
    const id=decodeURIComponent(hash.slice(11));
    return sectionEquipmentDetail(id);
  }
  const shown=lineFilter?eqs.filter(e=>e.line===lineFilter):eqs;
  APP().innerHTML=navHeader("設備中心")+`<main>
    <div class="tabs" style="padding:0">${lines.map(l=>`<button class="${l===lineFilter?"on":""}" onclick="sectionEquipment._line='${esc(l)}';sectionEquipment('#equipment')">${esc(l)}</button>`).join("")}
      <button class="${!lineFilter?"on":""}" onclick="sectionEquipment._line='';sectionEquipment('#equipment')">全部</button>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      ${shown.map(e=>`<div class="wo" style="border-radius:0;border-left:0;border-right:0;border-top:0;cursor:pointer" onclick="location.hash='#equipment/${e.id}'">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div><div class="id">${esc(e.id)}</div>
          <div class="meta">${esc(e.name)} · ${esc(e.line||"")}</div></div>
          <span class="pill" style="background:${e.status==="使用中"?"#e6f6ec":"#eceff1"};color:${e.status==="使用中"?"var(--ok)":"var(--mut)"}">${esc(e.status||"")}</span>
        </div></div>`).join("")||'<div class="hint" style="padding:16px">無設備資料</div>'}
    </div>
  </main>`;
}
sectionEquipment._line="";

function sectionEquipmentDetail(id){
  const eq=EQUIP[id]||{id,name:id};
  const eqWOs=woArr().filter(w=>w.equip===id||w.equipName===eq.name).slice(0,10);
  const plan=planArr().filter(p=>p.equip===id||p.equipName===eq.name);
  APP().innerHTML=navHeader(eq.name,{back:"location.hash='#equipment'"})+`<main>
    <div class="card"><h3>${esc(eq.id)} · ${esc(eq.name)}</h3>
      <div class="kpi"><div class="b"><div class="v">${esc(eq.line||"—")}</div><div class="l">線別</div></div>
        <div class="b"><div class="v">${esc(eq.status||"—")}</div><div class="l">狀態</div></div>
        <div class="b"><div class="v">${esc(eq.criticality||"N")}</div><div class="l">重要度</div></div></div>
      <div style="margin-top:12px;display:flex;gap:8px">
        <button class="sec" onclick="location.hash='#scan='+encodeURIComponent('${esc(id)}')">🔧 報工</button>
        <button class="sec" onclick="location.hash='#report='+encodeURIComponent('${esc(id)}')">⚠ 報修</button>
      </div>
    </div>
    <div class="card"><h3>工單記錄（最近 ${eqWOs.length}）</h3>
      ${eqWOs.length?eqWOs.map(w=>`<div class="wo"><div style="display:flex;justify-content:space-between">
        <div><div class="id">${esc(w.id||w._k)}</div>
        <div class="meta">${esc(w.item||w.symptom||"")} · ${esc(w.assignedTo||"未指派")}</div></div>
        <span class="pill s-${w.status||"待派工"}">${w.status||"待派工"}</span></div></div>`).join(""):'<div class="hint">無工單記錄</div>'}
    </div>
    <div class="card"><h3>保養計畫（${plan.length}筆）</h3>
      ${plan.length?plan.map(p=>`<div class="wo"><div class="id">${esc(p._k)}</div>
        <div class="meta">下次保養：${esc(p.nextDue||"—")} · 上次：${esc(p.lastDone||"—")}</div></div>`).join(""):'<div class="hint">無保養計畫</div>'}
    </div>
    <div class="card"><div class="section-stub"><div class="stub-icon">🔩</div><h3>完整設備詳情</h3>
      <div class="hint">備件清單、重要度分析、PM 排程等功能將在後續模組完整實作。</div></div></div>
  </main>`;
}

/* ===== Section: Engineers ===== */
function sectionEngineers(hash){
  const rList=Object.values(ROSTER).filter(r=>r.active!==false);
  const all=rList.length?rList:REPORTERS.map(n=>({name:n,role:"ENG"}));
  // #engineers/{name} → individual profile
  if(hash&&hash.indexOf("#engineers/")===0){
    const name=decodeURIComponent(hash.slice(11));
    return sectionEngineerProfile(name);
  }
  APP().innerHTML=navHeader("人員管理")+`<main>
    <div class="card"><h3>工程師陣容（${all.length}人）</h3>
      ${all.map(r=>`<div class="wo" style="cursor:pointer" onclick="location.hash='#engineers/'+encodeURIComponent('${esc(r.name)}')">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div><div class="id">${esc(r.name)}</div>
          ${r.role!=="ENG"?`<div class="meta">${esc(r.role)}</div>`:""}</div>
          <span class="pill" style="background:#e3f0ff;color:var(--blue)">${esc(r.role||"ENG")}</span>
        </div></div>`).join("")}
    </div>
    ${ENGINEER?`<div class="card"><button class="act" style="margin-top:0" onclick="location.hash='#engineers/'+encodeURIComponent(ENGINEER)">查看我的效益</button></div>`:""}
  </main>`;
}

function sectionEngineerProfile(name){
  const myWOs=woArr().filter(w=>w.assignedTo===name);
  const done=myWOs.filter(w=>w.status==="已完成");
  const open=myWOs.filter(w=>w.status!=="已完成");
  const recs=repArr().filter(r=>r.reporter===name||(r.reporters||[]).includes(name));
  const totalHrs=recs.reduce((s,r)=>s+(+r.hours||0),0);
  APP().innerHTML=navHeader(name,{back:"location.hash='#engineers'"})+`<main>
    <div class="card"><h3>${esc(name)}</h3>
      <div class="kpi">
        <div class="b"><div class="v">${open.length}</div><div class="l">進行中</div></div>
        <div class="b"><div class="v">${done.length}</div><div class="l">已完成</div></div>
        <div class="b"><div class="v">${totalHrs.toFixed(1)}</div><div class="l">工時 (h)</div></div>
      </div>
    </div>
    <div class="card"><h3>目前工單（${open.length}）</h3>
      ${open.length?open.map(w=>`<div class="wo"><div style="display:flex;justify-content:space-between">
        <div><div class="id">${esc(w.id||w._k)}</div><div class="meta">${esc(w.equipName||w.equip||"")} · ${esc(w.item||w.symptom||"")}</div></div>
        <span class="pill s-${w.status||"待派工"}">${w.status||"待派工"}</span></div></div>`).join(""):'<div class="hint">無進行中工單</div>'}
    </div>
    <div class="card"><div class="section-stub"><div class="stub-icon">📊</div><h3>完整個人效益</h3>
      <div class="hint">KPI、工時分析、歷史記錄等將在後續模組完整實作。</div>
      <button class="sec" style="margin-top:12px" onclick="location.hash='#myperf'">查看舊版效益頁</button>
    </div></div>
  </main>`;
}

function sectionAdmin(tab){
  if(tab==="inventory")return invView();
  if(!adminAuthed){
    // Don't re-render if PIN form is already showing (prevents clearing mid-entry)
    if(!document.getElementById("admin_pin"))adminLogin();
    return;
  }
  adminView();
}
